<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1424">
<title>Náhodné téma ke státnicím</title>
<style>
  :root {
    --bg: #0f1424;
    --card: #1a2138;
    --card-2: #232c49;
    --ink: #eef1f8;
    --muted: #9aa4c4;
    --accent: #6c8cff;
    --accent-2: #45d0a8;
    --line: #2c3556;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }
  .wrap {
    max-width: 660px;
    margin: 0 auto;
    padding: max(16px, env(safe-area-inset-top)) 16px
             calc(110px + env(safe-area-inset-bottom)) 16px;
  }

  header { text-align: center; margin: 12px 0 18px; }
  header h1 { font-size: 1.3rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  header p { margin: 0; color: var(--muted); font-size: 0.88rem; }

  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 18px;
  }
  .chip {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s, color .15s, border-color .15s;
  }
  .chip[aria-pressed="true"] {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .welcome { text-align: center; padding: 36px 18px; color: var(--muted); }
  .welcome .dice { font-size: 3.2rem; line-height: 1; margin-bottom: 10px; }
  .welcome p { margin: 6px 0 0; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 18px 22px;
    animation: pop .28s ease;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(10px) scale(.99); }
    to   { opacity: 1; transform: none; }
  }
  .card .cat {
    display: inline-block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent-2);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card h2 { margin: 0 0 14px; font-size: 1.45rem; letter-spacing: -0.02em; }

  .section-label {
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    font-weight: 700;
    margin: 0 0 6px;
  }
  .definition {
    background: var(--card-2);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 13px 15px;
    font-size: 1.02rem;
    margin: 0;
  }

  .scope-head {
    display: flex; align-items: center;
    justify-content: space-between; gap: 10px;
    flex-wrap: wrap;
    margin: 20px 0 6px;
  }
  .toggle {
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.74rem;
    padding: 5px 11px;
    border-radius: 999px;
    cursor: pointer;
  }

  details.sub {
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-top: 8px;
    background: var(--card-2);
    overflow: hidden;
  }
  details.sub summary {
    cursor: pointer;
    padding: 11px 36px 11px 13px;
    font-weight: 600;
    font-size: 0.97rem;
    list-style: none;
    position: relative;
  }
  details.sub summary::-webkit-details-marker { display: none; }
  details.sub summary::after {
    content: "+";
    position: absolute;
    right: 13px; top: 10px;
    color: var(--muted);
    font-size: 1.15rem;
    line-height: 1;
  }
  details.sub[open] summary::after { content: "\2212"; }
  .sub-def {
    margin: 0;
    padding: 0 13px 13px;
    color: var(--muted);
    font-size: 0.93rem;
  }

  .codes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 18px; }
  .code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.77rem;
    background: var(--card-2);
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 4px 9px;
    border-radius: 7px;
  }

  .progress {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    margin: 16px 0 0;
  }
  .actions {
    margin-top: 10px;
    text-align: center;
  }
  .actions .toggle {
    font-size: 0.78rem;
  }
  .sub-extra {
    margin: 0;
    padding: 0 13px 13px;
    color: var(--ink);
    font-size: 0.9rem;
    border-top: 1px solid var(--line);
  }
  .sub-extra strong { color: var(--accent-2); }

  .bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 72%, transparent);
  }
  .bar .inner { max-width: 660px; margin: 0 auto; }
  button.pick {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: inherit;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), #8a6cff);
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(108,140,255,.35);
    transition: transform .08s;
  }
  button.pick:active { transform: scale(.98); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎲 Náhodné téma ke státnicím</h1>
    <p><span id="count"></span> okruhů · definice + rozbor po dílčích pojmech</p>
  </header>

  <div class="filters" id="filters"></div>

  <main id="stage">
    <div class="welcome">
      <div class="dice">🎯</div>
      <p>Klepni na tlačítko dole a vylosuje se ti náhodný okruh.</p>
      <p>Dostaneš souhrnnou definici a ke každému dílčímu pojmu samostatné vysvětlení.</p>
    </div>
  </main>

  <p class="progress" id="progress"></p>
  <div class="actions">
    <button class="toggle" id="resetProgress">Resetovat dokončení</button>
  </div>
</div>

<div class="bar">
  <div class="inner">
    <button class="pick" id="pick">Vybrat náhodné téma</button>
  </div>
</div>

<script>
const TOPICS = [
  {
    cat: "Matematika a teoretická informatika",
    title: "Lineární algebra",
    codes: ["MB151"],
    def: "Lineární algebra je oblast matematiky, která studuje vektory, vektorové prostory a lineární zobrazení mezi nimi. Základním objektem je vektor – uspořádaná n-tice čísel, kterou lze geometricky chápat jako bod nebo orientovanou úsečku v n-rozměrném prostoru. Lineární zobrazení (transformace) jsou zobrazení zachovávající součet vektorů a násobení skalárem; každé takové zobrazení lze v dané bázi reprezentovat maticí. Matice tak slouží jednak jako zápis lineárních transformací, jednak jako zápis soustav lineárních rovnic. Centrálními úlohami jsou řešení soustav lineárních rovnic Gaussovou eliminací, výpočet determinantu (který určuje regularitu matice a změnu objemu při transformaci) a hledání vlastních čísel a vektorů, jež popisují „přirozené směry“ transformace. Lineární algebra je základním nástrojem napříč informatikou – v počítačové grafice, strojovém učení, zpracování signálů i v numerických metodách.",
    scope: [
      { t: "Operace s vektory a maticemi", d: "Vektory lze sčítat po složkách a násobit skalárem; matice navíc můžeme násobit mezi sebou, kde násobení odpovídá skládání lineárních zobrazení. Násobení matic není komutativní (A·B ≠ B·A) a je definováno jen pro kompatibilní rozměry. Transponování matice prohazuje její řádky a sloupce." },
      { t: "Vlastnosti lineárních operací a skalární součin", d: "Sčítání vektorů a násobení skalárem splňují axiomy jako asociativita, komutativita sčítání a distributivita. Skalární součin dvou vektorů přiřazuje číslo a měří jejich „podobnost“ – umožňuje definovat délku (normu) vektoru a úhel mezi vektory. Dva vektory jsou kolmé (ortogonální) právě tehdy, když je jejich skalární součin nulový." },
      { t: "Gaussova eliminace", d: "Gaussova eliminace je algoritmus pro řešení soustav lineárních rovnic, který pomocí elementárních řádkových úprav převede matici soustavy na schodovitý (trojúhelníkový) tvar. Z tohoto tvaru se řešení dopočítá zpětnou substitucí. Metoda zároveň určí, zda má soustava jediné řešení, nekonečně mnoho řešení, nebo žádné." },
      { t: "Determinant", d: "Determinant je číslo přiřazené čtvercové matici, které vyjadřuje, kolikrát daná transformace zvětší objem a zda mění orientaci. Matice je regulární (invertibilní) právě tehdy, když je její determinant nenulový. Počítá se rozvojem podle řádku či sloupce, Gaussovou eliminací, nebo Sarrusovým pravidlem pro matice 3×3." },
      { t: "Vlastní čísla a vektory a jejich geometrický význam", d: "Vlastní vektor matice je nenulový vektor, jehož směr se transformací nemění – pouze se škáluje. Příslušné vlastní číslo udává faktor tohoto škálování (platí A·v = λ·v). Geometricky vlastní vektory určují „osy“ transformace; využívají se například při diagonalizaci matic nebo v analýze hlavních komponent (PCA)." },
      { t: "Inverzní matice", d: "Inverzní matice A⁻¹ je matice, pro kterou platí A·A⁻¹ = I (jednotková matice). Existuje pouze pro čtvercové regulární matice s nenulovým determinantem. Geometricky reprezentuje opačnou transformaci a umožňuje řešit soustavu A·x = b jako x = A⁻¹·b." },
      { t: "Vektorové podprostory", d: "Vektorový podprostor je podmnožina vektorového prostoru, která je sama uzavřená na sčítání vektorů a násobení skalárem a obsahuje nulový vektor. Příkladem je přímka nebo rovina procházející počátkem. Důležitými podprostory matice jsou její jádro a obraz (sloupcový prostor)." },
      { t: "Vektorové báze", d: "Báze je množina lineárně nezávislých vektorů, která generuje (rozpíná) celý prostor – každý vektor lze vyjádřit jako jejich jednoznačnou lineární kombinaci. Počet vektorů báze se nazývá dimenze prostoru. Změna báze umožňuje popsat tentýž objekt v jiných souřadnicích." },
      { t: "Lineární transformace", d: "Lineární transformace je zobrazení mezi vektorovými prostory, které zachovává sčítání vektorů a násobení skalárem. Příkladem jsou rotace, škálování, projekce či zrcadlení. Po zvolení bází lze každou lineární transformaci jednoznačně reprezentovat maticí a její skládání odpovídá násobení matic." }
    ]
  },
  {
    cat: "Matematika a teoretická informatika",
    title: "Základy matematické analýzy",
    codes: ["IB000", "MB152"],
    def: "Matematická analýza je oblast matematiky studující spojité veličiny a jejich změny pomocí limitního přechodu. Zatímco algebra pracuje s konečnými operacemi, analýza zkoumá nekonečné procesy – přibližování, spojitost a okamžitou změnu. Základním objektem je reálná funkce, která přiřazuje vstupní hodnotě hodnotu výstupní. Klíčovým pojmem je limita, jež popisuje, k jaké hodnotě se funkce blíží; na ní jsou postavené pojmy spojitost, derivace i integrál. Derivace měří okamžitou rychlost změny funkce, tedy sklon tečny k jejímu grafu, a tvoří jádro diferenciálního počtu. Integrál naopak vyjadřuje akumulaci a geometricky odpovídá obsahu plochy pod grafem funkce. Diferenciální a integrální počet jsou propojeny základní větou analýzy. Analýza je základem pro modelování spojitých dějů ve fyzice i ekonomii a pro optimalizační algoritmy, například gradientní sestup ve strojovém učení.",
    scope: [
      { t: "Relace a zobrazení", d: "Relace je množina uspořádaných dvojic, která vyjadřuje vztah mezi prvky množin. Zobrazení (funkce) je speciální relace, jež každému prvku definičního oboru přiřazuje právě jeden prvek oboru hodnot. Zobrazení mohou být injektivní (prostá), surjektivní (na), nebo bijektivní." },
      { t: "Vlastnosti reálných funkcí", d: "Reálná funkce přiřazuje reálným číslům reálná čísla. Sledujeme u ní vlastnosti jako definiční obor, monotonie (rostoucí/klesající), omezenost, sudost a lichost, periodicita a existence extrémů. Tyto vlastnosti popisují chování grafu funkce." },
      { t: "Polynomy", d: "Polynom je funkce tvaru aₙxⁿ + … + a₁x + a₀. Je definovaný na celém ℝ, je spojitý a hladký (libovolně derivovatelný). Stupeň polynomu omezuje počet jeho kořenů i jeho chování v nekonečnu." },
      { t: "Spojité funkce a limity", d: "Limita popisuje, k jaké hodnotě se funkce blíží, když se vstup blíží danému bodu. Funkce je v bodě spojitá, pokud její limita v tomto bodě existuje a rovná se funkční hodnotě – graf se „nepřetrhne“. Spojitá funkce na uzavřeném intervalu nabývá maxima, minima i všech mezilehlých hodnot." },
      { t: "Derivace", d: "Derivace funkce v bodě je limita podílu přírůstku funkce a přírůstku argumentu; udává okamžitou rychlost změny a geometricky sklon tečny. Pomocí derivace nacházíme lokální extrémy, intervaly monotonie a inflexní body. Existují pravidla pro derivaci součtu, součinu, podílu a složené funkce." },
      { t: "Neurčitý a určitý integrál", d: "Neurčitý integrál je opačná operace k derivaci – hledá primitivní funkci. Určitý integrál je číslo, které vyjadřuje „součet“ hodnot funkce přes interval. Newtonova–Leibnizova (základní) věta tyto dva pojmy spojuje: určitý integrál spočítáme pomocí primitivní funkce." },
      { t: "Geometrický význam", d: "Derivace odpovídá sklonu tečny ke grafu funkce v daném bodě. Určitý integrál odpovídá obsahu (orientované) plochy mezi grafem funkce a osou x. Tyto interpretace umožňují řešit úlohy o ploše, objemu, délce křivky i o rychlosti." },

    ]
  },
  {
    cat: "Matematika a teoretická informatika",
    title: "Kombinatorika a pravděpodobnost",
    codes: ["IB000", "MB153"],
    def: "Kombinatorika je oblast diskrétní matematiky zabývající se počítáním, výběrem a uspořádáním objektů z konečných množin; odpovídá na otázky typu „kolika způsoby lze…“. Pravděpodobnost na ni navazuje: kvantifikuje míru očekávatelnosti náhodných jevů reálným číslem mezi 0 (nemožný jev) a 1 (jistý jev). U klasické (Laplaceovy) definice je pravděpodobnost jevu poměrem počtu příznivých výsledků ku počtu všech možných výsledků – proto je kombinatorika k jejímu výpočtu nezbytná. Důležitým rozšířením je podmíněná pravděpodobnost, která popisuje pravděpodobnost jevu za předpokladu, že nastal jiný jev. Bayesova věta pak umožňuje „obrátit“ podmíněnost a aktualizovat odhad pravděpodobnosti na základě nové informace. Tyto pojmy jsou základem statistiky, strojového učení, analýzy pravděpodobnostních algoritmů i kryptografie.",

      { t: "Pravděpodobnost", d: "Pravděpodobnost přiřazuje jevům číslo z intervalu [0, 1] vyjadřující míru jejich očekávatelnosti. V klasické definici je rovna poměru počtu příznivých výsledků ku počtu všech stejně možných výsledků. Splňuje Kolmogorovovy axiomy: je nezáporná, jistý jev má pravděpodobnost 1 a u neslučitelných jevů se pravděpodobnosti sčítají." },
      { t: "Podmíněná pravděpodobnost (Bayesova věta)", d: "Podmíněná pravděpodobnost P(A|B) udává pravděpodobnost jevu A za předpokladu, že nastal jev B. Bayesova věta vyjadřuje P(A|B) pomocí P(B|A) a umožňuje tak „obrátit“ podmíněnost. Využívá se k aktualizaci odhadů na základě nové informace – například v naivním Bayesovském klasifikátoru či v lékařské diagnostice." }

  {

    scope: [
      { t: "Popisná statistika", d: "Popisná statistika přehledně shrnuje a popisuje pozorovaná data pomocí tabulek, grafů a číselných charakteristik. Na rozdíl od induktivní statistiky nevyvozuje závěry o celé populaci, pouze popisuje dostupný vzorek. Slouží jako první krok průzkumové analýzy dat." },
      { t: "Střední hodnota", d: "Střední hodnota (aritmetický průměr) je součet hodnot dělený jejich počtem; je nejběžnější mírou polohy. U náhodné veličiny jde o vážený průměr hodnot podle jejich pravděpodobností (očekávaná hodnota). Je citlivá na odlehlé hodnoty (outliery)." },
      { t: "Medián", d: "Medián je hodnota, která rozděluje seřazená data na dvě stejně velké poloviny. Je mírou polohy odolnou vůči odlehlým hodnotám, proto je vhodný pro nesymetrická rozdělení (například příjmy). Spolu s kvartily tvoří základ krabicového grafu." },
      { t: "Rozptyl", d: "Rozptyl měří variabilitu dat – průměrnou kvadratickou odchylku hodnot od střední hodnoty. Jeho odmocninou je směrodatná odchylka, vyjádřená ve stejných jednotkách jako data. Malý rozptyl znamená, že hodnoty leží blízko průměru." },

  {
    cat: "Matematika a teoretická informatika",
    title: "Stromové datové struktury",
    codes: ["IB002"],
    def: "Stromové datové struktury organizují data do hierarchické struktury vrcholů spojených hranami, kde každý vrchol kromě kořene má jednoho rodiče. Jejich hlavní výhodou je, že při zachování vyváženosti umožňují provádět základní operace – vyhledávání, vkládání a mazání – v logaritmickém čase vzhledem k počtu prvků. Základem je binární vyhledávací strom (BST), v němž platí uspořádání: levý podstrom obsahuje menší klíče, pravý větší. Aby si BST udržel logaritmickou hloubku i v nejhorším případě, používají se samovyvažující varianty jako červeno-černé nebo AVL stromy, které po každé operaci obnoví vyváženost rotacemi. B-stromy jsou vícecestné vyvážené stromy navržené pro ukládání dat na disku (databáze, souborové systémy), kde minimalizují počet diskových přístupů. Halda je strom optimalizovaný pro rychlý přístup k prvku s nejvyšší či nejnižší prioritou a slouží jako základ prioritní fronty a algoritmu heapsort. Volba správné stromové struktury zásadně ovlivňuje efektivitu programů.",

      { t: "Binární vyhledávací stromy", d: "Binární vyhledávací strom (BST) je binární strom s uspořádáním klíčů: v levém podstromu jsou menší, v pravém větší klíče než v kořeni uzlu. To umožňuje vyhledávání podobné půlení intervalu. V nevyváženém případě však může degenerovat na seznam a operace pak trvají lineární čas." },
      { t: "B-stromy", d: "B-strom je vyvážený vícecestný vyhledávací strom, v němž každý uzel obsahuje více klíčů a má více potomků. Je navržen pro práci s daty na disku – jeden uzel odpovídá diskovému bloku, čímž se minimalizuje počet pomalých diskových přístupů. Používá se v databázích a souborových systémech." },
      { t: "Červeno-černé stromy", d: "Červeno-černý strom je samovyvažující binární vyhledávací strom, jehož uzly jsou obarveny červeně nebo černě. Sada pravidel o barvách zaručuje, že nejdelší cesta není delší než dvojnásobek nejkratší, takže hloubka zůstává logaritmická. Vyváženost se po vkládání a mazání obnovuje rotacemi a přebarvováním." },

  {
    cat: "Matematika a teoretická informatika",
    title: "Návrh algoritmů",
    codes: ["IB002", "IB015"],
    def: "Návrh algoritmů se zabývá obecnými metodami a technikami tvorby efektivních algoritmů a porozuměním jejich vlastnostem. Jednou z nejdůležitějších technik je metoda rozděl a panuj (divide and conquer): problém se rozdělí na menší podproblémy téhož typu, ty se vyřeší (typicky rekurzivně) a jejich řešení se sloučí do výsledku. Tato technika přirozeně vede k rekurzi – mechanismu, kdy se funkce volá sama. Rekurze úzce souvisí s matematickou indukcí: rekurzivní algoritmus se dokazuje a chápe stejnou strukturou jako indukční důkaz (báze a indukční krok). Rekurze je elegantní, ale má i nevýhody – režii volání a riziko přetečení zásobníku – proto se někdy převádí na iteraci (odstranění rekurze). Klasickým příkladem jsou rekurzivní řadicí algoritmy mergesort a quicksort, které dělí pole na části, ty seřadí a spojí. Pochopení návrhu algoritmů umožňuje volit vhodné techniky a odhadovat časovou i prostorovou složitost řešení.",
    scope: [
      { t: "Metoda rozděl a panuj", d: "Rozděl a panuj je návrhová technika o třech krocích: rozdělit problém na menší podproblémy, vyřešit je (obvykle rekurzivně) a sloučit jejich řešení. Funguje dobře, lze-li problém přirozeně dělit a jsou-li podproblémy nezávislé. Příklady: mergesort, quicksort, binární vyhledávání." },
      { t: "Výhody a nevýhody použití rekurze", d: "Rekurze umožňuje stručný a čitelný zápis algoritmů odpovídající struktuře problému. Nevýhodou je režie volání funkcí, spotřeba zásobníku (riziko přetečení) a možné opakované počítání týchž podproblémů. Hloubka rekurze je omezena velikostí zásobníku." },
      { t: "Odstranění rekurze", d: "Rekurzi lze nahradit iterací – buď použitím explicitního zásobníku, který simuluje volání, nebo u koncové rekurze prostým cyklem. Důvodem je úspora paměti a režie a vyhnutí se přetečení zásobníku. Některé jazyky a kompilátory provádějí optimalizaci koncové rekurze automaticky." },
      { t: "Řadicí rekurzivní algoritmy", d: "Mergesort dělí pole na poloviny, ty rekurzivně seřadí a poté slévá; má stabilní složitost O(n log n) a vyžaduje pomocnou paměť. Quicksort volí pivot, rozdělí pole na menší a větší prvky a rekurzivně řadí části; v průměru O(n log n), v nejhorším případě O(n²). Oba jsou ukázkou metody rozděl a panuj." },
      { t: "Vztah rekurze a matematické indukce", d: "Rekurze i matematická indukce mají stejnou strukturu: základní (triviální) případ a krok, který řeší problém pomocí menšího případu. Správnost rekurzivního algoritmu se proto dokazuje indukcí – báze odpovídá ukončovací podmínce, indukční krok rekurzivnímu volání. Indukce zároveň zaručuje konečnost výpočtu, pokud se velikost problému stále zmenšuje." }

  {
    cat: "Matematika a teoretická informatika",
    title: "Funkcionální programování",
    codes: ["IB015"],
    def: "Funkcionální programování je programovací paradigma, v němž je výpočet chápán jako vyhodnocování matematických funkcí a jejich aplikace na argumenty, nikoli jako posloupnost příkazů měnících stav, jak je tomu v imperativním programování. Funkce jsou zde „hodnotami první třídy“ – lze je předávat jako argumenty, vracet z jiných funkcí a ukládat do proměnných. Klíčovou vlastností čistého funkcionálního programování je absence vedlejších efektů a neměnnost dat: funkce pro stejný vstup vždy vrátí stejný výstup (referenční transparentnost), což usnadňuje úvahy o správnosti i paralelizaci. Výpočet probíhá jako postupné přepisování (redukce) výrazů podle definic až k výsledku; pořadí přepisování určuje redukční strategie. Typickými nástroji jsou funkce vyšších řádů a nepojmenované (lambda) funkce. Reprezentativním jazykem je Haskell, který je čistě funkcionální a líně vyhodnocovaný.",
    scope: [

    def: "Teorie vyčíslitelnosti (rozhodnutelnosti) zkoumá zásadní otázku: které problémy lze vůbec vyřešit algoritmem, bez ohledu na to, kolik času či paměti bychom měli k dispozici. Aby šlo o této otázce přesně uvažovat, je třeba formálně definovat pojem algoritmu; standardním modelem je Turingův stroj. Podle Churchovy–Turingovy teze Turingovy stroje přesně zachycují intuitivní pojem efektivně vyčíslitelného. Rozhodovací problém je rozhodnutelný, existuje-li algoritmus, který pro každý vstup po konečném čase odpoví ANO, nebo NE. Je částečně rozhodnutelný (rekurzivně spočetný), pokud algoritmus odpoví ANO na kladných vstupech, ale na záporných nemusí skončit. Existují však problémy nerozhodnutelné – nejznámější je problém zastavení (zda daný program na daném vstupu skončí). Jeho nerozhodnutelnost se dokazuje diagonalizací. K důkazu nerozhodnutelnosti dalších problémů slouží metoda redukce. Tato teorie vymezuje principiální hranice toho, co počítače dokážou.",

      { t: "Kódy (vnitřní, vnější, detekční a opravné)", d: "Kódování přiřazuje informaci posloupnost bitů; vnitřní kódy slouží uvnitř počítače, vnější pro přenos a uchování. Detekční kódy, například paritní bit nebo CRC, umožňují odhalit chybu, opravné kódy jako Hammingův kód ji navíc opravit – za cenu přidané redundance. Používají se při přenosu i ukládání dat." },

      { t: "Základní režimy procesoru", d: "Procesor pracuje nejméně ve dvou režimech: privilegovaném (jaderném), kde je dovoleno vše, a uživatelském, kde je přístup k hardwaru omezen. Toto oddělení chrání systém před chybami a útoky aplikací. Přechod do jádra nastává systémovým voláním nebo přerušením." },
      { t: "Programovací rozhraní a knihovny", d: "Operační systém nabízí aplikacím programovací rozhraní (API) tvořené systémovými voláními pro práci se soubory, procesy, pamětí a sítí. Knihovny tato volání zabalují do pohodlnějších funkcí. Aplikace se tak nemusí starat o detaily hardwaru." },

const CATEGORIES = [...new Set(TOPICS.map(t => t.cat))];

let activeFilter = "Vše";
let bag = [];
let lastIndex = -1;
const COMPLETED_COOKIE = "completedTitles";
const COOKIE_DAYS = 365;
let completedTitles = loadCompletedTitles();

document.getElementById("count").textContent = String(TOPICS.length);

const filtersEl = document.getElementById("filters");
["Vše", ...CATEGORIES].forEach(name => {
  const btn = document.createElement("button");
  btn.className = "chip";
  btn.textContent = name === "Matematika a teoretická informatika" ? "Matematika a TI"
                  : name === "Programové, výpočetní a informační systémy" ? "Programové systémy"
                  : name;
  btn.title = name;
  btn.setAttribute("aria-pressed", String(name === activeFilter));
  btn.addEventListener("click", () => {
    activeFilter = name;
    [...filtersEl.children].forEach(c => c.setAttribute("aria-pressed", String(c === btn)));
    bag = [];
    pick();
  });
  filtersEl.appendChild(btn);
});

function pool() {
  return TOPICS
    .map((t, i) => i)
    .filter(i => activeFilter === "Vše" || TOPICS[i].cat === activeFilter);
}

function refillBag() {
  bag = pool();
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
  if (bag.length > 1 && bag[bag.length - 1] === lastIndex) {
    [bag[0], bag[bag.length - 1]] = [bag[bag.length - 1], bag[0]];
  }
}

function pick() {
  if (bag.length === 0) refillBag();
  const idx = bag.pop();
  lastIndex = idx;
  render(TOPICS[idx]);
  markTitleCompleted(TOPICS[idx].title);

  const total = pool().length;
  const done = total - bag.length;
  document.getElementById("progress").textContent =
    "Téma " + done + " z " + total + " v tomto kole" +
    (bag.length === 0 ? " · kolo se zamíchá" : "") +
    " · dokončeno titulů: " + completedTitles.size + " z " + TOPICS.length;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function plural(n) {
  if (n === 1) return "pojem";
  if (n >= 2 && n <= 4) return "pojmy";
  return "pojmů";
}

function render(topic) {
  const card = el("article", "card");
  card.appendChild(el("span", "cat", topic.cat));
  card.appendChild(el("h2", null, topic.title));

  card.appendChild(el("div", "section-label", "Souhrnná definice"));
  card.appendChild(el("p", "definition", topic.def));

  const head = el("div", "scope-head");
  head.appendChild(el("div", "section-label",
    "Rozbor po dílčích pojmech · " + topic.scope.length + " " + plural(topic.scope.length)));
  const toggle = el("button", "toggle", "Skrýt definice");
  head.appendChild(toggle);
  card.appendChild(head);

  const subs = [];
  topic.scope.forEach(s => {
    const d = document.createElement("details");
    d.className = "sub";
    d.open = true;
    d.appendChild(el("summary", null, s.t));
    d.appendChild(el("p", "sub-def", s.d));
    const practical = el("p", "sub-extra");
    practical.innerHTML = "<strong>Praktický příklad:</strong> " + practicalExample(topic.title, s.t);
    d.appendChild(practical);
    const ex = el("p", "sub-extra");
    ex.innerHTML = "<strong>Cvičení:</strong> " + practicalExercise(topic.title, s.t);
    d.appendChild(ex);
    card.appendChild(d);
    subs.push(d);
  });

  toggle.addEventListener("click", () => {
    const anyOpen = subs.some(d => d.open);
    subs.forEach(d => d.open = !anyOpen);
    toggle.textContent = anyOpen ? "Zobrazit definice" : "Skrýt definice";
  });

  const codes = el("div", "codes");
  topic.codes.forEach(c => codes.appendChild(el("span", "code", c)));
  card.appendChild(codes);

  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  stage.appendChild(card);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

    "Vlastní čísla a vektory a jejich geometrický význam": { ex: "U A=[[2,0],[0,3]] jsou vlastní čísla 2 a 3 s vlastními vektory (1,0) a (0,1) – transformace pouze natáhne osu x dvakrát a osu y třikrát.", cv: "Pro A=[[2,1],[1,2]] najdi vlastní čísla z rovnice det(A−λI)=0, dopočítej vlastní vektory a ověř je dosazením do A·v=λ·v." },

    "Vektorové podprostory": { ex: "Rovina x+y+z=0 v R³ je podprostor: obsahuje nulový vektor a součet i násobek jejích vektorů opět splňuje rovnici; rovina x+y+z=1 podprostorem není.", cv: "Rozhodni, zda M={(x,y,z) | x+y+z=0} je podprostor R³ – ověř všechny tři podmínky – a pokud ano, najdi jeho bázi." },

  "Základy matematické analýzy": {
    "Relace a zobrazení": { ex: "Relace „je dělitelem“ na {1,2,3,4} obsahuje dvojice jako (2,4); zobrazení f(x)=x² z R do R není prosté, protože f(−1)=f(1).", cv: "Pro f(x)=2x+1 a g(x)=x² rozhodni u každé, zda je z R do R injektivní, surjektivní, nebo bijektivní, a zdůvodni to." },
    "Vlastnosti reálných funkcí": { ex: "Funkce f(x)=x² má definiční obor R, je sudá (f(−x)=f(x)), zdola omezená nulou a na (−∞,0) klesající, na (0,∞) rostoucí.", cv: "U funkce f(x)=1/(x−2) urči definiční obor, monotonii a rozhodni o sudosti, lichosti a omezenosti." },
    "Polynomy": { ex: "Polynom p(x)=x³−x má kořeny −1, 0, 1, je definovaný na celém R a v +∞ roste nade všechny meze, protože vedoucí člen má lichý stupeň.", cv: "Pro p(x)=x³−4x najdi všechny reálné kořeny, urči stupeň a popiš chování polynomu v ±∞." },
    "Spojité funkce a limity": { ex: "Funkce f(x)=(x²−1)/(x−1) není v bodě 1 definovaná, ale limita pro x→1 je 2; doplněním f(1)=2 vznikne spojitá funkce.", cv: "Spočítej limitu (x²−4)/(x−2) pro x→2 a rozhodni, jakou hodnotou v bodě 2 funkci dodefinovat, aby byla spojitá." },
    "Derivace": { ex: "Pro f(x)=x³−3x je f′(x)=3x²−3; z f′(x)=0 plynou body x=±1, kde má funkce lokální extrémy (maximum v −1, minimum v 1).", cv: "Derivuj f(x)=x³−3x, urči intervaly monotonie a najdi a klasifikuj všechny lokální extrémy." },
    "Neurčitý a určitý integrál": { ex: "Primitivní funkcí k x² je x³/3, takže podle Newtonovy–Leibnizovy věty je ∫₀² x² dx = [x³/3]₀² = 8/3.", cv: "Spočítej ∫₀² (x²+1) dx tak, že najdeš primitivní funkci a dosadíš meze." },
    "Geometrický význam": { ex: "Derivace f′(2) funkce f(x)=x² je 4 – sklon tečny v bodě (2,4); určitý integrál ∫₀¹ x dx = 1/2 je obsah trojúhelníka pod grafem.", cv: "Pro f(x)=x² napiš rovnici tečny v bodě x=1 a spočítej obsah plochy mezi grafem a osou x na intervalu [0,1]." },
    "Diferenciální počet": { ex: "Vyšetření f(x)=x³−3x: z první derivace plynou extrémy v ±1, z druhé derivace inflexní bod v 0, Taylorův polynom v bodě 0 začíná −3x.", cv: "Proveď úplné vyšetření průběhu funkce f(x)=x³−3x: definiční obor, monotonie, extrémy, konvexita a inflexní bod." }

  "Kombinatorika a pravděpodobnost": {

  "Popisná statistika": {

    "Korelace": { ex: "Mezi výškou a hmotností bývá korelace kolem +0,7 (silný kladný vztah), ale korelace prodeje zmrzliny a utonutí je jen zdánlivá – obojí způsobuje horko.", cv: "Pro dvojice (1,2),(2,4),(3,5),(4,9) odhadni, zda je korelace kladná, či záporná, a uveď příklad, kdy korelace neznamená kauzalitu." },
    "Odhady statistik a jejich spolehlivost": { ex: "Z výběru 100 voličů odhadneme podporu strany na 40 % s konfidenčním intervalem zhruba 40 % ± 10 %; při 1000 dotázaných se interval zúží.", cv: "Z výběru o velikosti n s průměrem 50 vysvětli, jak se změní šířka 95% konfidenčního intervalu, když n zvětšíš čtyřikrát." },
    "Distribuční funkce": { ex: "Pro hod kostkou je distribuční funkce F schodovitá: F(3)=1/2, protože P(X≤3)=3/6, a roste od 0 do 1.", cv: "Náhodná veličina nabývá hodnot 1,2,3 s pravděpodobnostmi 0,2; 0,5; 0,3. Sestav a načrtni její distribuční funkci." },

  "Elementární teorie čísel": {

    "Komponenty souvislosti": { ex: "Graf s hranami AB, CD má dvě komponenty souvislosti {A,B} a {C,D}; opakovaným spuštěním DFS z nenavštívených vrcholů je všechny najdeme.", cv: "V grafu s vrcholy A–F a hranami AB, BC, DE urči počet komponent souvislosti a vypiš, které vrcholy do nich patří." }

  "Grafové algoritmy": {

  "Funkcionální programování": {
    "Funkcionální programovací paradigma": { ex: "Funkce délka seznamu nepoužívá žádnou měnitelnou proměnnou ani cyklus – výsledek je dán jen vstupem, takže pro stejný seznam vrátí vždy totéž.", cv: "Vysvětli na konkrétním příkladu rozdíl mezi imperativním sčítáním prvků pole cyklem a funkcionálním přístupem přes fold." },
    "Princip výpočtu a redukční krok": { ex: "Výraz (λx. x+1) 4 se jedním redukčním krokem přepíše na 4+1 a dalším na 5 – výpočet je řetězec přepisů až do normálního tvaru.", cv: "Postupnými redukčními kroky vyhodnoť výraz double (double 3), kde double x = x+x, a zapiš každý mezikrok." },
    "Redukční strategie a jejich vlastnosti": { ex: "U výrazu fst (3, ⊥) líná strategie vrátí 3, kdežto striktní by se pokusila vyhodnotit i nevyhodnotitelnou druhou složku a zacyklila se.", cv: "Pro výraz s nevyhodnotitelnou podčástí ukaž, jak se liší výsledek u striktní a u líné redukční strategie." },
    "Funkce vyšších řádů a jejich využití": { ex: "map (*2) [1,2,3] dá [2,4,6], filter even [1..6] dá [2,4,6] a foldr (+) 0 [1,2,3] sečte seznam na 6 – žádný cyklus není potřeba.", cv: "Pomocí map, filter a fold napiš výraz, který z [1..10] vybere sudá čísla, umocní je na druhou a sečte." },
    "Nepojmenované funkce": { ex: "Místo pojmenované funkce se ve volání map přímo zapíše lambda – krátká funkce „na místě“ bez jména, například λx → x·x.", cv: "Přepiš pojmenovanou funkci inc x = x+1 na ekvivalentní lambda výraz a použij ji ve volání map nad seznamem [1,2,3]." },
    "Elementární programování v Haskellu": { ex: "Funkci délka seznamu lze v Haskellu zapsat dvěma rovnicemi s pattern matchingem: length [] = 0 a length (_:xs) = 1 + length xs.", cv: "Definuj v Haskellu rekurzivní funkci, která sečte prvky seznamu, s využitím pattern matchingu na prázdný a neprázdný seznam." }
  },
  "Regulární jazyky": {
    "Chomského hierarchie formálních jazyků": { ex: "Jazyk slov nad {a,b} sudé délky je regulární (typ 3), jazyk aⁿbⁿ je bezkontextový (typ 2) a aⁿbⁿcⁿ už ani bezkontextový není.", cv: "Zařaď do Chomského hierarchie tři jazyky: všechna slova obsahující „ab“, jazyk aⁿbⁿ a jazyk aⁿbⁿcⁿ, a zdůvodni to." },
    "Regulární jazyky, jejich reprezentace a převody": { ex: "Jazyk slov končících na „ab“ popíšeme regulárním výrazem (a|b)*ab, ekvivalentní pravolineární gramatikou i konečným automatem.", cv: "Pro regulární výraz (a|b)*ab sestroj odpovídající konečný automat a slovně popiš, který jazyk přijímá." },
    "Varianty konečných automatů": { ex: "DKA pro slova se sudým počtem znaků a má dva stavy; tentýž jazyk lze popsat i NKA, případně NKA s ε-přechody.", cv: "Navrhni deterministický konečný automat, který přijímá právě binární řetězce dělitelné třemi (čteno jako číslo)." },
    "Nedeterminismus a determinizace automatů": { ex: "NKA pro slova končící na „ab“ má jen 3 stavy; podmnožinová konstrukce z něj udělá DKA, jehož stavy jsou množiny stavů NKA.", cv: "Pro malý NKA se 3 stavy proveď determinizaci podmnožinovou konstrukcí a zapiš přechodovou tabulku výsledného DKA." },
    "Uzávěrové vlastnosti regulárních jazyků": { ex: "Jsou-li L1 i L2 regulární, je regulární i jejich průnik, sjednocení a doplněk; že L=aⁿbⁿ regulární není, dokážeme pumping lemmatem.", cv: "Pumping lemmatem dokaž, že jazyk L={aⁿbⁿ | n≥0} není regulární." }
  },
  "Bezkontextové jazyky a jejich reprezentace": {
    "Varianty zásobníkových automatů": { ex: "Zásobníkový automat pro správné párování závorek při čtení „(“ symbol uloží na zásobník a při „)“ ho odebere – zásobník mu dává paměť navíc oproti konečnému automatu.", cv: "Navrhni zásobníkový automat, který přijímá jazyk slov tvaru aⁿbⁿ, a popiš jeho práci se zásobníkem." },
    "Metody akceptování": { ex: "Tentýž zásobníkový automat může přijímat buď koncovým stavem, nebo prázdným zásobníkem; pro nedeterministické automaty jsou obě metody stejně silné.", cv: "Pro jazyk aⁿbⁿ navrhni přijímání prázdným zásobníkem a vysvětli, jak by vypadalo přijímání koncovým stavem." },
    "Determinismus a nedeterminismus": { ex: "Jazyk palindromů wwᴿ rozpozná jen nedeterministický zásobníkový automat, protože musí „uhodnout“ střed slova – determinismus zde nestačí.", cv: "Vysvětli na příkladu jazyka palindromů, proč u zásobníkových automatů nedeterminismus přidává sílu, na rozdíl od konečných automatů." },
    "Nedeterministická syntaktická analýza": { ex: "Parser výrazu 1+2*3 podle gramatiky aritmetiky sestaví derivační strom, v němž je násobení pod sčítáním, takže se vyhodnotí dřív.", cv: "Pro jednoduchou gramatiku výrazů sestroj derivační strom řetězce 1+2*3 a ověř, že odpovídá prioritě operací." },
    "Uzávěrové vlastnosti bezkontextových jazyků": { ex: "Bezkontextové jazyky jsou uzavřené na sjednocení, ne však na průnik: L1=aⁿbⁿcᵐ i L2=aᵐbⁿcⁿ jsou bezkontextové, jejich průnik aⁿbⁿcⁿ ale není.", cv: "Uveď konkrétní dva bezkontextové jazyky, jejichž průnik bezkontextový není, a zdůvodni to." }
  },
  "Rozhodnutelnost": {
    "Pojem algoritmického problému a algoritmu": { ex: "„Je dané číslo prvočíslo?“ je rozhodovací problém s odpovědí ANO/NE; algoritmus zkusmého dělení je konečný jednoznačný postup, který ho řeší.", cv: "Zformuluj problém „obsahuje seznam duplicitní prvek?“ jako rozhodovací problém a popiš algoritmus, který ho řeší." },
    "Turingův stroj": { ex: "Turingův stroj pro rozpoznání slov aⁿbⁿ střídavě škrtá a a b na pásce a v konečném řízení si pamatuje jen aktuální stav, ne počty symbolů.", cv: "Navrhni přechody Turingova stroje, který na pásce zdvojnásobí počet symbolů a (z aⁿ udělá a²ⁿ)." },
    "Problém zastavení": { ex: "Neexistuje program, který by o libovolném programu a vstupu řekl, zda skončí – předpoklad jeho existence vede sporem k programu, jenž skončí právě tehdy, když neskončí.", cv: "Vlastními slovy popiš důkaz nerozhodnutelnosti problému zastavení a uveď, kde v něm vzniká spor." },
    "Rozhodnutelnost a částečná rozhodnutelnost": { ex: "Problém zastavení je částečně rozhodnutelný – program prostě spustíme a u kladných případů skončí – ale rozhodnutelný není, protože u záporných se nezastaví.", cv: "Vysvětli na příkladu problému zastavení rozdíl mezi rozhodnutelností a částečnou rozhodnutelností a uveď větu o doplňku." },
    "Nerozhodnutelnost": { ex: "Nerozhodnutelná je i otázka, zda dva programy počítají tutéž funkci – nejde o nedostatek výkonu počítače, ale o principiální mez algoritmického řešení.", cv: "Vyjmenuj tři nerozhodnutelné problémy a vysvětli, proč nerozhodnutelnost nesouvisí s rychlostí počítače." },
    "Metoda redukce": { ex: "Nerozhodnutelnost otázky „vypíše program někdy slovo HELLO?“ se dokáže redukcí z problému zastavení – kdyby šla řešit, šel by řešit i halting problem.", cv: "Naznač, jak redukcí z problému zastavení dokázat, že je nerozhodnutelné, zda program na daném vstupu vůbec použije nějakou proměnnou." },
    "Diagonalizace": { ex: "Diagonalizací Cantor dokázal, že reálných čísel je „více“ než přirozených: zkonstruoval číslo lišící se od n-tého čísla seznamu na n-té číslici.", cv: "Pomocí diagonalizace dokaž, že množina všech nekonečných posloupností nul a jedniček je nespočetná." }
  },
  "Složitost": {
    "Složitost algoritmu versus složitost problému": { ex: "Bublinkové řazení má složitost O(n²), mergesort O(n log n); složitost problému řazení porovnáváním je přitom dokázaných Ω(n log n).", cv: "Pro problém násobení dvou matic n×n uveď složitost naivního algoritmu a vysvětli rozdíl mezi složitostí algoritmu a složitostí problému." },
    "Složitostní třídy (P, NP, PSPACE)": { ex: "Hledání nejkratší cesty je v P, ověření řešení Sudoku je v NP (řešení se snadno zkontroluje), vyhodnocení kvantifikované formule je v PSPACE.", cv: "Pro tři problémy – třídění, SAT, hledání nejkratší cesty – urči, do které třídy (P či NP) patří, a zdůvodni to." },
    "Vztahy mezi třídami a příklady problémů": { ex: "Platí P⊆NP⊆PSPACE; zda je některá inkluze ostrá, se neví – otázka P vs. NP je nejslavnějším otevřeným problémem informatiky.", cv: "Nakresli diagram inkluzí tříd P, NP, PSPACE a ke každé třídě doplň jeden typický problém." },
    "Těžkost a úplnost problému": { ex: "SAT je NP-úplný: leží v NP a zároveň se na něj dá polynomiálně redukovat každý problém z NP, takže je v NP „nejtěžší“.", cv: "Vysvětli rozdíl mezi NP-těžkým a NP-úplným problémem a uveď příklad problému ke každé kategorii." },
    "Polynomiální redukce problémů": { ex: "Problém nezávislé množiny se polynomiálně redukuje na problém kliky převedením grafu na jeho doplněk – řešení jednoho dá řešení druhého.", cv: "Popiš alespoň v hrubých rysech polynomiální redukci problému 3-SAT na problém barvení grafu nebo na klikový problém." },
    "NP-úplné úlohy": { ex: "Mezi NP-úplné patří SAT, barvení grafu, problém obchodního cestujícího i problém batohu; vyřešení jediného z nich v polynomiálním čase by znamenalo P=NP.", cv: "Vyber tři NP-úplné problémy a u každého popiš jeho vstup, otázku a snadno ověřitelný certifikát řešení." }
  },
  "Principy strojového učení": {
    "Učení s učitelem a bez učitele": { ex: "Rozpoznávání spamu z označených e-mailů je učení s učitelem; rozdělení zákazníků do skupin podle chování bez předem daných značek je učení bez učitele.", cv: "Pro tři úlohy – předpověď ceny bytu, shlukování článků podle témat, hraní šachů – urči typ učení (s učitelem, bez učitele, posilované)." },
    "Proces trénování modelů a vyhodnocování výsledků": { ex: "Model s 99% přesností na trénovacích datech a 60% na testovacích je přeučený – naučil se trénovací data nazpaměť místo obecného vzoru.", cv: "Popiš, jak bys data rozdělil na trénovací a testovací část, a vysvětli, jak z obou přesností poznáš přeučení." },
    "Učení rozhodovacích stromů": { ex: "Strom pro rozhodnutí „jít ven?“ se v kořeni ptá na atribut, který nejvíc sníží entropii – například „prší?“ – protože ten dělí data nejlépe.", cv: "Pro malou tabulku 6 příkladů se dvěma atributy ručně vyber kořenový atribut podle informačního zisku." },
    "Metoda k nejbližších sousedů": { ex: "Nový bod se klasifikuje podle většiny mezi jeho k nejbližšími sousedy – při k=3 a sousedech tříd A, A, B vyhraje třída A.", cv: "Na 2D bodech s třídami urči, jak bude klasifikován nový bod metodou k-NN pro k=1 a k=3, a vysvětli vliv volby k." },
    "(Naivní) Bayesovský klasifikátor": { ex: "Spamový filtr spočítá pravděpodobnost spamu ze slov v e-mailu a „naivně“ předpokládá, že se slova vyskytují nezávisle – přesto funguje dobře.", cv: "Pro krátký trénovací soubor e-mailů spočítej pravděpodobnosti slov a naivním Bayesem klasifikuj nový e-mail." },
    "Logistická regrese": { ex: "Logistická regrese odhadne pravděpodobnost, že je nádor zhoubný, z jeho velikosti – sigmoida převede lineární kombinaci vstupů na číslo mezi 0 a 1.", cv: "Vysvětli, proč se logistická regrese přes svůj název používá ke klasifikaci, a popiš roli sigmoidní funkce." },
    "Detekce anomálií": { ex: "Banka modeluje běžné transakce zákazníka; platba v cizí zemi za neobvyklou částku má nízkou pravděpodobnost a označí se jako možný podvod.", cv: "Navrhni, jak bys detekoval anomálie v měřeních teploty serveru, a urči, co považuješ za „normální“ chování." }
  },
  "Metody strojového učení": {
    "Lineární regrese a metoda nejmenších čtverců": { ex: "Závislost ceny bytu na ploše proložíme přímkou tak, aby součet kvadrátů svislých odchylek bodů od přímky byl minimální.", cv: "Pro body (1,2),(2,2),(3,4),(4,5) načrtni přibližně nejlépe proloženou přímku a vysvětli, co metoda nejmenších čtverců minimalizuje." },
    "Hierarchické shlukování": { ex: "Aglomerativní shlukování začne s každým bodem jako samostatným shlukem a postupně slučuje nejbližší dvojice, až vznikne dendrogram.", cv: "Pro 5 bodů na přímce proveď aglomerativní shlukování a nakresli odpovídající dendrogram." },
    "Algoritmus k-means": { ex: "Pro k=2 algoritmus k-means střídá přiřazení bodů k nejbližšímu středu a přepočet středů, dokud se přiřazení neustálí.", cv: "Na 6 bodech v rovině proveď dvě iterace k-means pro k=2 a zapiš středy a přiřazení po každé iteraci." },
    "Model umělého neuronu": { ex: "Neuron s váhami (1,1) a prahem 1,5 počítá logickou funkci AND: na vstup (1,1) dá výstup 1, na ostatní vstupy 0.", cv: "Navrhni váhy a práh jednoho neuronu se skokovou aktivací tak, aby realizoval logickou funkci OR." },
    "Vícevrstvé sítě a jejich vyjadřovací schopnosti": { ex: "Jediný neuron neumí funkci XOR, protože není lineárně oddělitelná; dvouvrstvá síť ji už zvládne díky skryté vrstvě a nelineární aktivaci.", cv: "Vysvětli, proč funkci XOR nelze realizovat jedním neuronem, a načrtni síť se skrytou vrstvou, která ji řeší." },
    "Učení modelů pomocí gradientního sestupu": { ex: "Gradientní sestup hledá minimum chybové funkce jako kuličku kutálející se z kopce – v každém kroku se posune proti směru gradientu o krok daný rychlostí učení.", cv: "Pro funkci f(w)=(w−3)² proveď tři kroky gradientního sestupu z w=0 s krokem 0,1 a zapiš hodnoty w." }
  },
  "Umělá inteligence": {
    "Vymezení umělé inteligence": { ex: "Šachový program i hlasový asistent jsou příklady „slabé“ AI řešící konkrétní úlohu; „silná“ AI s obecnou inteligencí zatím zůstává hypotetická.", cv: "Roztřiď pět příkladů systémů na ty, které bys označil za AI, a ostatní, a u každého zdůvodni rozhodnutí." },
    "Turingův test": { ex: "Chatbot uspěje v Turingově testu, pokud člověk v psané konverzaci nepozná, že nemluví s člověkem – test posuzuje chování, ne vnitřní porozumění.", cv: "Uveď jednu námitku proti Turingovu testu jako kritériu inteligence (například čínský pokoj) a vysvětli ji." },
    "Prohledávání stavového prostoru – neinformované": { ex: "Hlavolam s posuvnými dlaždicemi je stavový prostor; BFS prochází stavy po vrstvách a najde řešení s nejmenším počtem tahů, ale prozkoumá jich mnoho.", cv: "Pro bludiště zformuluj stavy, počáteční a cílový stav a operátory přechodu a popiš, jak by ho prošlo BFS." },
    "Prohledávání stavového prostoru – heuristické": { ex: "Algoritmus A* hledá cestu v mapě tak, že kombinuje ujetou vzdálenost s heuristickým odhadem (vzdušnou čarou k cíli), čímž hledání nasměruje.", cv: "Pro hledání cesty v mřížce navrhni přípustnou heuristiku (například manhattanskou vzdálenost) a vysvětli, proč zaručuje optimalitu A*." },
    "Problémy s omezujícími podmínkami": { ex: "Sudoku je CSP: proměnné jsou políčka, obory hodnot 1–9 a podmínky zakazují stejné číslo v řádku, sloupci a bloku; řeší se backtrackingem.", cv: "Zapiš obarvení mapy tří sousedících států třemi barvami jako CSP – urči proměnné, obory hodnot a podmínky." },
    "Hry a herní strategie (minimax, alfa-beta, ohodnocovací funkce)": { ex: "Ve hře piškvorky minimax projde strom tahů a předpokládá optimální hru obou stran; alfa-beta ořezávání přitom přeskočí větve, které výsledek nemohou změnit.", cv: "Na malém herním stromu s ohodnocenými listy urči minimaxovou hodnotu kořene a vyznač větve, které alfa-beta ořeže." }
  },
  "Matematická logika": {
    "Výroková logika": { ex: "Formule (A ∧ B) → A je tautologie – pravdivostní tabulka se 4 řádky ukáže, že je pravdivá při každém ohodnocení A a B.", cv: "Sestav pravdivostní tabulku formule (A → B) ∧ (B → A) a rozhodni, kdy je pravdivá." },
    "Predikátová logika": { ex: "Tvrzení „každé sudé číslo větší než 2 je součtem dvou prvočísel“ zapíšeme v predikátové logice pomocí ∀, ∃ a predikátů – výroková logika na to nestačí.", cv: "Zapiš v predikátové logice větu „existuje student, který zná všechny předměty“ pomocí kvantifikátorů a predikátů." },
    "Splnitelnost": { ex: "Formule (A ∨ B) ∧ (¬A ∨ ¬B) je splnitelná (například A pravdivé, B nepravdivé), kdežto A ∧ ¬A je nesplnitelná kontradikce.", cv: "Rozhodni o splnitelnosti formule (A ∨ B) ∧ ¬A ∧ ¬B a u splnitelné najdi vyhovující ohodnocení." },
    "Pravdivost": { ex: "Formule A ∨ ¬A je tautologie – pravdivá při každém ohodnocení; její negace je nesplnitelná, což ilustruje vztah pravdivosti a splnitelnosti.", cv: "Rozhodni, zda je formule (A → B) ∨ (B → A) tautologie, a ověř to pomocí negace a splnitelnosti." },
    "Dokazatelnost": { ex: "Formuli A → A lze odvodit v důkazovém kalkulu konečnou posloupností kroků; věta o úplnosti zaručuje, že dokazatelné je právě to, co je pravdivé.", cv: "Vysvětli rozdíl mezi dokazatelností (syntaxe) a pravdivostí (sémantika) a uveď, co o jejich vztahu říkají věty o korektnosti a úplnosti." },
    "Důkazové metody": { ex: "Že √2 je iracionální, se dokazuje sporem; že 1+2+…+n = n(n+1)/2, se dokazuje matematickou indukcí.", cv: "Matematickou indukcí dokaž, že součet prvních n lichých čísel je n²." },
    "Rezoluční metoda": { ex: "K množině klauzulí přidáme negaci tvrzení a rezolucí z dvojic jako {A, B} a {¬A} odvodíme {B}, až vznikne prázdná klauzule – spor.", cv: "Pomocí rezoluce dokaž, že z A→B a B→C plyne A→C: převeď na klauzule a odvoď prázdnou klauzuli." },
    "Reprezentace a vyvozování znalostí": { ex: "Z faktů „Sokrates je člověk“ a pravidla „každý člověk je smrtelný“ expertní systém inferencí odvodí „Sokrates je smrtelný“.", cv: "Zapiš jako fakta a pravidla znalost o příbuzenských vztazích a ukaž, jak z nich odvodit, kdo je čí prarodič." }
  },
  "Strukturování a řízení běhu programu": {
    "Podprogramy": { ex: "Místo trojího opakování kódu pro výpočet obsahu obdélníku se napíše jediná funkce obsah(a,b) a třikrát se zavolá s různými argumenty.", cv: "Rozděl delší kód počítající průměr a směrodatnou odchylku pole na dvě funkce a ukaž jejich volání." },
    "Rozsahy jmen": { ex: "Lokální proměnná i v jednom cyklu nijak nekoliduje s proměnnou i v jiné funkci – každá existuje jen ve svém bloku.", cv: "Napiš krátký kód, kde stejně pojmenovaná lokální a globální proměnná koexistují, a urči, kterou hodnotu která část kódu vidí." },
    "Předávání hodnot": { ex: "Při předání pole odkazem může funkce změnit jeho prvky volajícímu; při předání čísla hodnotou se změna kopie ven nepromítne.", cv: "Napiš funkci, která má prohodit dvě proměnné, a vysvětli, proč funguje jen při předání odkazem, ne hodnotou." },
    "Výjimky": { ex: "Dělení nulou nebo otevření neexistujícího souboru vyhodí výjimku, kterou blok try–catch zachytí a ošetří, aniž by program spadl.", cv: "Napiš blok try–catch, který ošetří dělení nulou a chybu při převodu řetězce na číslo, a urči pořadí catch větví." },
    "Objektově orientované programování": { ex: "Třída BankovníÚčet sdružuje data (zůstatek) a chování (vložit, vybrat); jednotlivé účty jsou její objekty s vlastním zůstatkem.", cv: "Navrhni třídu Auto s atributy a metodami a vytvoř z ní dvě různé instance s odlišnými hodnotami atributů." },
    "Zapouzdření": { ex: "Atribut zůstatek je private a mění se jen metodami vložit a vybrat, které hlídají, aby účet nešel do mínusu – přímý zápis zvenčí není možný.", cv: "Uprav třídu s veřejným atributem na zapouzdřenou verzi se soukromým atributem a getterem a setterem, který kontroluje platnost hodnoty." },
    "Dědičnost": { ex: "Třída Student dědí z třídy Osoba jméno a věk a přidává atribut studijní obor – vyjadřuje vztah „student je osoba“.", cv: "Navrhni předka Zaměstnanec a dva potomky (Manažer, Programátor), kteří dědí společné atributy a přidávají vlastní." },
    "Polymorfismus": { ex: "Voláme metodu vykresli() na poli tvarů; díky dynamické vazbě se u každého prvku spustí implementace podle skutečného typu – kruh, nebo čtverec.", cv: "Navrhni společné rozhraní Tvar s metodou obvod() a dvě třídy, které ji různě implementují, a zavolej ji jednotně přes seznam tvarů." }
  },
  "Principy nízkoúrovňového programování": {
    "Paměťový model programu": { ex: "Lokální proměnná funkce leží na zásobníku a po jejím skončení zaniká, kdežto data alokovaná pomocí malloc leží na haldě a přežijí návrat z funkce.", cv: "Pro krátký program v C urči u každé proměnné, zda leží v zásobníku, na haldě, nebo ve statických datech." },
    "Správa paměti a dynamická alokace": { ex: "Po int *p = malloc(100*sizeof(int)) je nutné jednou zavolat free(p); zapomenutý free je únik paměti, dvojí free je chyba.", cv: "Napiš v C kód, který alokuje pole o n prvcích, naplní ho a korektně uvolní, a vyznač místo možného úniku paměti." },
    "Práce s uživatelskými datovými strukturami": { ex: "Jednosměrný spojový seznam tvoří uzly alokované na haldě, kde každý drží data a ukazatel na následující uzel; konec značí NULL.", cv: "Implementuj v C jednosměrný spojový seznam s operacemi vlož na začátek a vypiš a nezapomeň na uvolnění všech uzlů." },
    "Nízkoúrovňová práce s pamětí": { ex: "Zápis za konec pole o velikosti 10 přepíše cizí paměť – jazyk meze nehlídá, takže chyba se projeví až později nebo jako bezpečnostní díra.", cv: "Najdi v zadaném krátkém kódu v C zápis mimo meze pole a oprav ho; vysvětli, proč je takový přístup nebezpečný." },
    "Ukazatel": { ex: "Po int x=5; int *p=&x; obsahuje p adresu x a *p je hodnota 5; zápisem *p=8 změníme přímo proměnnou x.", cv: "Napiš funkci v C, která přes ukazatel zvýší hodnotu předané proměnné o 1, a ukaž její volání pomocí &." },
    "Pole a ukazatelová aritmetika": { ex: "Pro int a[5] je a[i] totéž co *(a+i); jméno pole se chová jako ukazatel na první prvek a posun o i znamená i·sizeof(int) bajtů.", cv: "Projdi pole pěti intů pomocí ukazatelové aritmetiky (bez indexování hranatými závorkami) a vypiš jeho prvky." },
    "Způsoby ladění programu (debugging)": { ex: "Pád programu se v debuggeru zúží breakpointem a krokováním na konkrétní řádek; nástroj Valgrind navíc odhalí únik paměti či čtení neinicializovaných dat.", cv: "Popiš postup, jak bys pomocí breakpointů a sledování proměnných našel příčinu chybného výsledku v cyklu." }
  },
  "Architektury": {
    "Číselné soustavy a vztahy mezi nimi": { ex: "Číslo 13 v desítkové soustavě je 1101 dvojkově a D šestnáctkově; převod do dvojkové soustavy se dělá opakovaným dělením dvěma.", cv: "Převeď číslo 45 z desítkové soustavy do dvojkové a šestnáctkové a výsledek ověř zpětným převodem." },
    "Zobrazení celého čísla v počítači a aritmetika": { ex: "Na 8 bitech je −5 v doplňkovém kódu 11111011; jeho sečtení s 00000101 (tedy 5) dá 00000000, což potvrzuje správnost kódu.", cv: "Zapiš číslo −12 v osmibitovém doplňkovém kódu a ukaž, kdy při sčítání dvou kladných čísel nastane přetečení." },
    "Kódy (vnitřní, vnější, detekční a opravné)": { ex: "Paritní bit přidaný k bajtu odhalí jednu chybu; Hammingův kód přidá víc redundantních bitů a jednu chybu nejen odhalí, ale i opraví.", cv: "K datovému slovu 1011 doplň sudý paritní bit a vysvětli, kterou chybu paritní bit nedokáže odhalit." },
    "Obvody a paměti (parametry, architektura)": { ex: "Sčítačka je kombinační obvod (výstup závisí jen na vstupech), klopný obvod je sekvenční – pamatuje si bit, a je tak základem registru.", cv: "Sestav pravdivostní tabulku a logický obvod poloviční sčítačky dvou bitů (výstupy součet a přenos)." },
    "Procesor, programování, mikroprogramování": { ex: "Procesor opakuje cyklus načti–dekóduj–vykonej instrukci; řadič může být pevná logika, nebo mikroprogram, kde je instrukce rozložena na mikroinstrukce.", cv: "Popiš jednotlivé fáze zpracování jedné instrukce procesorem a urči, co se v každé fázi děje s registry." },
    "Architektury RISC/CISC a vyrovnávací paměti": { ex: "RISC procesor má málo jednoduchých instrukcí pevné délky, CISC mnoho složitějších; cache mezi CPU a RAM zrychluje přístup k nedávno použitým datům.", cv: "Porovnej RISC a CISC ve třech bodech a vysvětli, proč cache funguje díky lokalitě paměťových přístupů." }
  },
  "Databáze": {
    "Relační model dat": { ex: "Tabulka STUDENT(id, jméno, ročník) je relace: každý řádek je n-tice, sloupce jsou atributy a na pořadí řádků nezáleží.", cv: "Navrhni relaci pro evidenci knih v knihovně – urči atributy, jejich domény a vysvětli, proč jde o relaci." },
    "Relační schéma": { ex: "Schéma KNIHA(ISBN: text, název: text, rok: číslo) je neměnný předpis, kdežto konkrétní řádky knih se v čase přidávají a mažou.", cv: "Zapiš relační schéma pro tabulku ZAMĚSTNANEC s alespoň pěti atributy a urči jejich datové typy." },
    "Klíče relačních schémat": { ex: "V tabulce STUDENT je rodné číslo kandidátní klíč; jako primární klíč se ale zvolí umělé id_studenta a cizí klíč id_oboru odkazuje na tabulku OBOR.", cv: "Pro tabulky OBJEDNÁVKA a ZÁKAZNÍK urči primární klíče a navrhni cizí klíč, který je propojuje." },
    "Relační algebra (projekce, selekce, agregace, přejmenování)": { ex: "Selekce σ(ročník=1)(STUDENT) vybere prváky, projekce π(jméno)(STUDENT) vybere jen sloupec jméno a agregace spočítá počet studentů.", cv: "Zapiš v relační algebře dotaz „jména studentů 3. ročníku“ pomocí selekce a projekce nad tabulkou STUDENT." },
    "Spojování relací": { ex: "Přirozené spojení tabulek STUDENT a OBOR přes společný atribut id_oboru spojí ke každému studentovi název jeho oboru.", cv: "Pro tabulky ZAMĚSTNANEC(id, jméno, id_odd) a ODDĚLENÍ(id_odd, název) zapiš spojení, které ke každému zaměstnanci přiřadí název oddělení." },
    "Funkční závislosti": { ex: "V tabulce s atributy (ISBN, název, autor) platí ISBN → název, autor – ISBN jednoznačně určuje zbytek; opačně to neplatí.", cv: "Pro relaci OBJEDNÁVKA(č_obj, datum, č_zák, jméno_zák) vypiš platné funkční závislosti a urči z nich klíč." },
    "Normální formy (1NF, 2NF, 3NF, BCNF)": { ex: "Tabulka, kde jeden sloupec obsahuje seznam telefonů, porušuje 1NF; rozdělením na atomické hodnoty se do 1NF dostane.", cv: "U tabulky STUDENT(č_stud, předmět, jméno_uč, kabinet_uč) urči, kterou normální formu porušuje a proč." },
    "Vztahy mezi normálními formami": { ex: "Schéma v BCNF je automaticky i ve 3NF, 2NF a 1NF – normální formy tvoří vnořenou hierarchii a v praxi se cílí na 3NF.", cv: "Seřaď normální formy 1NF–BCNF od nejslabší po nejsilnější a u každé jednou větou uveď, co navíc požaduje." },
    "Dekompozice relačních schémat a normalizace": { ex: "Tabulku STUDENT(č_stud, předmět, jméno_uč) rozložíme na ZÁPIS(č_stud, předmět) a VÝUKA(předmět, jméno_uč), čímž odstraníme redundanci.", cv: "Rozlož tabulku porušující 3NF na menší relace, ověř bezeztrátovost spojení a zachování závislostí." }
  },
  "SQL, transakce a zpracování dotazů": {
    "Syntaxe a sémantika příkazů": { ex: "Dotaz SELECT jméno FROM Student WHERE ročník=1 je deklarativní – říká, co chceme; tentýž výsledek lze získat i jinak zapsaným dotazem.", cv: "Napiš SQL dotaz, který vrátí jména a e-maily studentů 2. ročníku seřazené podle příjmení." },
    "Příkazy pro dotazování a aktualizaci dat": { ex: "SELECT data čte, INSERT přidá řádek, UPDATE … WHERE změní vybrané řádky a DELETE … WHERE je smaže.", cv: "Napiš čtveřici SQL příkazů: vlož nového studenta, zvyš ročník studentovi s daným id, vyber všechny prváky a smaž studenta podle id." },
    "Agregační funkce": { ex: "SELECT obor, COUNT(*) FROM Student GROUP BY obor spočítá počet studentů v každém oboru; klauzule HAVING pak ponechá jen velké obory.", cv: "Napiš dotaz, který pro každé oddělení vypíše průměrný plat a vynechá oddělení s méně než pěti zaměstnanci." },
    "Triggery a uložené procedury": { ex: "Trigger po INSERT do tabulky Objednávka automaticky sníží počet kusů na skladě – pravidlo se vynutí, aniž by ho aplikace musela volat.", cv: "Navrhni trigger, který při smazání zákazníka zapíše záznam do auditní tabulky se jménem a časem." },
    "Definice dat a integritní omezení": { ex: "CREATE TABLE s PRIMARY KEY, FOREIGN KEY a CHECK(věk ≥ 18) zajistí, že databáze sama odmítne nekonzistentní data.", cv: "Napiš CREATE TABLE pro tabulku Zaměstnanec s primárním klíčem, cizím klíčem na Oddělení a omezeními NOT NULL a CHECK." },
    "Transakční zpracování a jeho vlastnosti": { ex: "Převod peněz mezi účty je transakce: oba UPDATE proběhnou celé, nebo se při chybě mezi nimi vše vrátí příkazem ROLLBACK – atomicita brání ztrátě peněz.", cv: "Zapiš pseudokódem transakci převodu částky mezi dvěma účty a u každé vlastnosti ACID uveď, který krok ji zajišťuje." },
    "Základní principy vyhodnocování dotazů": { ex: "Dotaz hledající studenta podle id projde bez indexu celou tabulku, s indexem (B-stromem) nad id ho najde v čase O(log n).", cv: "Vysvětli, jak by se zrychlil dotaz WHERE příjmení='Novák' přidáním indexu, a uveď cenu, kterou index přináší." }
  },
  "Operační systémy": {
    "Architektura operačního systému a jádra": { ex: "Linux má monolitické jádro – ovladače běží uvnitř jádra; mikrojádro většinu služeb vyčleňuje do oddělených procesů, což zvyšuje spolehlivost za cenu výkonu.", cv: "Porovnej monolitické jádro a mikrojádro ve třech bodech: výkon, spolehlivost a snadnost rozšiřování." },
    "Základní režimy procesoru": { ex: "Aplikace běží v uživatelském režimu; když chce zapsat do souboru, přejde systémovým voláním do privilegovaného režimu, kde jádro provede skutečný zápis.", cv: "Vysvětli, proč by bylo nebezpečné nechat aplikace běžet rovnou v privilegovaném režimu, a uveď, čím se přechod do jádra spouští." },
    "Programovací rozhraní a knihovny": { ex: "Funkce printf z knihovny jazyka C nakonec volá systémové volání write; knihovna programátorovi skryje detaily komunikace s jádrem.", cv: "Vyjmenuj tři typické skupiny systémových volání (soubory, procesy, paměť) a u každé uveď příklad operace." },
    "Uživatel, přístupová práva, virtualizace": { ex: "Soubor s právy rw-r--r-- smí vlastník číst i zapisovat, ostatní jen číst; kontejner zase poskytuje izolované prostředí na jednom jádře.", cv: "Vysvětli zápis přístupových práv rwxr-x--- a urči, co s daným souborem smí vlastník, skupina a ostatní." },
    "Virtuální paměť, proces a stránkové tabulky": { ex: "Dva procesy mohou oba „vidět“ adresu 0x400000, ale stránková tabulka ji u každého mapuje na jiný fyzický rámec – procesy se tak navzájem izolují.", cv: "Vysvětli, jak stránková tabulka přeloží virtuální adresu na fyzickou a co se stane při přístupu na odloženou stránku (page fault)." },
    "Vlákno, plánování vláken a procesů": { ex: "Webový prohlížeč je proces s mnoha vlákny (vykreslování, síť, UI); plánovač jim přiděluje procesor například metodou round-robin po časových kvantech.", cv: "Pro tři úlohy s danými dobami běhu spočítej průměrnou dobu čekání při plánování FCFS a round-robin." },
    "Souběžnost, uváznutí, přidělování zdrojů": { ex: "Dvě vlákna, z nichž každé drží jeden zámek a čeká na druhý, uváznou (deadlock); jednotné pořadí získávání zámků tomu zabrání.", cv: "Popiš situaci dvou vláken a dvou zámků, která vede k uváznutí, a navrhni úpravu, jež deadlocku zabrání." },
    "Vznik procesu v POSIX a copy-on-write": { ex: "Po volání fork existují dva téměř totožné procesy; díky copy-on-write sdílejí paměťové stránky, dokud do nich některý nezapíše.", cv: "Napiš v C krátký program, který volá fork, a vysvětli, jak podle návratové hodnoty odlišit rodiče a potomka." }
  },
  "Souborové systémy": {
    "Blokové zařízení": { ex: "Disk poskytuje čtení a zápis po blocích třeba 4 KiB; uložení souboru o 5 KiB tak zabere dva bloky a v druhém zůstane nevyužité místo (vnitřní fragmentace).", cv: "Spočítej, kolik bloků o 4 KiB zabere soubor velikosti 10 KiB a kolik bajtů v posledním bloku zůstane nevyužitých." },
    "Bloková vrstva a I/O plánovač": { ex: "I/O plánovač přeskupí požadavky tak, aby se hlava rotačního disku pohybovala plynule jedním směrem (výtahový algoritmus), a tím zvýší propustnost.", cv: "Pro zadanou frontu požadavků na stopy disku urči pořadí obsluhy podle algoritmu výtahu (SCAN) a spočítej celkový pohyb hlavy." },
    "RAID": { ex: "RAID 1 zrcadlí data na dva disky a přežije výpadek jednoho z nich; RAID 0 data rozkládá pro rychlost, ale výpadek disku znamená ztrátu všech dat.", cv: "Porovnej RAID 0, RAID 1 a RAID 5 z hlediska kapacity, rychlosti a odolnosti vůči výpadku disku." },
    "Šifrování disku": { ex: "Při šifrování celého disku jsou data na úložišti nečitelná; po krádeži notebooku se k nim útočník bez hesla nedostane.", cv: "Vysvětli rozdíl mezi šifrováním celého disku a šifrováním jednotlivých souborů a uveď, před jakou hrozbou každé chrání." },
    "Obyčejné soubory": { ex: "Textový soubor je z pohledu systému jen pojmenovaná posloupnost bajtů s metadaty (velikost, práva, čas změny) – jeho „typ“ je věcí aplikace.", cv: "Vyjmenuj, jaká metadata si souborový systém o obyčejném souboru udržuje, a vysvětli, čím se liší od jeho obsahu." },
    "Alokace volného místa a fragmentace": { ex: "Souvislá alokace je rychlá na čtení, ale po mazání souborů vzniká roztříštěné volné místo; indexová alokace přes i-uzel umí soubor uložit i do nesouvislých bloků.", cv: "Porovnej souvislou, zřetězenou a indexovou alokaci bloků z hlediska rychlosti přístupu a náchylnosti k fragmentaci." },
    "Adresářová struktura a její reprezentace na disku": { ex: "Adresář je na disku tabulka dvojic jméno → číslo i-uzlu; i-uzel pak drží metadata souboru a odkazy na jeho datové bloky.", cv: "Popiš, jaké kroky souborový systém udělá při otevření souboru zadaného cestou /home/user/data.txt." },
    "Vstup a výstup mapovaný do paměti": { ex: "Po namapování souboru do paměti čte program jeho obsah prostým přístupem do pole; o načítání bloků z disku se postará stránkování.", cv: "Vysvětli výhody čtení souboru přes mapování do paměti oproti opakovanému volání read a uveď situaci, kde se hodí." }
  },
  "Sítě": {
    "Modely vrstev (ISO/OSI, TCP/IP)": { ex: "Model ISO/OSI má 7 vrstev, praktický model TCP/IP 4; každá vrstva poskytuje službu té nad sebou a skrývá detaily těch pod sebou.", cv: "Přiřaď protokoly HTTP, IP, Ethernet a TCP k vrstvám modelu TCP/IP a u každého urči jeho úlohu." },
    "Funkcionalita a součinnost vrstev, adresace": { ex: "Při odesílání dat se na každé vrstvě přidá hlavička (zapouzdření): transportní přidá port, síťová IP adresu, spojová MAC adresu.", cv: "Popiš, jak se z dat aplikace stane rámec procházením vrstev, a urči, jaký druh adresy přidá každá vrstva." },
    "Fyzická vrstva, signály a jejich kódování": { ex: "Manchesterovo kódování reprezentuje bit změnou úrovně signálu uprostřed intervalu, čímž zároveň přenáší synchronizaci hodin.", cv: "Pro bitovou posloupnost 1011 načrtni průběh signálu při kódování NRZ a při Manchesterově kódování." },
    "Řízení přístupu k médiu": { ex: "Klasický Ethernet používá CSMA/CD – stanice před vysíláním poslouchá médium a při kolizi vysílání přeruší; Wi-Fi se kolizím vyhýbá pomocí CSMA/CA.", cv: "Vysvětli rozdíl mezi CSMA/CD a CSMA/CA a uveď, proč se na bezdrátové síti nepoužívá detekce kolizí." },
    "Propojování počítačových sítí": { ex: "Přepínač propojuje zařízení v jedné lokální síti podle MAC adres, směrovač propojuje různé sítě podle IP adres.", cv: "Pro zařízení opakovač, přepínač a směrovač urči, na které vrstvě modelu pracují a co přesně dělají." },
    "Síťové protokoly, přepínání a směrování, multicast": { ex: "Směrovač podle směrovací tabulky pošle paket na další skok k cíli; multicast doručí jeden video stream současně skupině příjemců místo posílání kopie každému zvlášť.", cv: "Vysvětli rozdíl mezi unicastem, broadcastem a multicastem a uveď ke každému typickou aplikaci." },
    "Zajištěný přenos, sestavení a ukončení spojení": { ex: "TCP naváže spojení třícestným handshakem (SYN, SYN-ACK, ACK), čísluje bajty a ztracené segmenty posílá znovu podle chybějících potvrzení.", cv: "Nakresli sled zpráv třícestného handshake TCP a vysvětli, jak příjemce pozná ztracený segment." },
    "Transportní protokoly": { ex: "Stahování souboru používá TCP (spolehlivost je důležitější než rychlost), živé video či online hra spíš UDP (snese ztrátu, ale ne zpoždění).", cv: "Pro čtyři aplikace (e-mail, videohovor, DNS dotaz, přenos souboru) vyber TCP, nebo UDP a rozhodnutí zdůvodni." }
  },
  "Síťové aplikace a bezpečnost": {
    "Základní aplikační protokoly (pošta, přenos souborů, web, jmenná služba)": { ex: "Při psaní www.muni.cz do prohlížeče nejprve DNS přeloží jméno na IP adresu a teprve pak HTTP stáhne stránku z toho serveru.", cv: "Ke každému protokolu SMTP, IMAP, HTTP, FTP a DNS přiřaď jeho úlohu a uveď, na kterém portu typicky běží." },
    "Principy popisu a zajištění kvality služby": { ex: "Bez QoS jsou všechny pakety obslouženy „nejlépe, jak to jde“; s QoS dostane hlasový hovor přednost před stahováním, aby se nesekal.", cv: "Vyjmenuj čtyři parametry QoS (propustnost, zpoždění, jitter, ztrátovost) a urči, na které z nich je citlivý videohovor." },
    "Použití pro multimédia": { ex: "Streamovaný film se ukládá do vyrovnávací paměti o několik sekund dopředu, aby kolísání zpoždění sítě nezpůsobilo trhání obrazu.", cv: "Vysvětli, proč živé vysílání volí UDP a toleruje občasnou ztrátu paketu, a jak buffer vyhladí jitter." },
    "Zabezpečení síťové komunikace, autentizace a šifrování": { ex: "HTTPS zajišťuje důvěrnost (šifrování), integritu (data nelze nepozorovaně změnit) i autentizaci serveru pomocí certifikátu.", cv: "Pro komunikaci s internetovým bankovnictvím urči, jak je zajištěna důvěrnost, integrita a autentizace a jakým primitivem." },
    "Zabezpečení na jednotlivých protokolových vrstvách": { ex: "TLS zabezpečuje jednotlivé spojení na transportní vrstvě (základ HTTPS), IPsec chrání veškerý IP provoz na síťové vrstvě (základ VPN).", cv: "Porovnej TLS a IPsec: na které vrstvě působí, jaký rozsah provozu chrání a kde se každé typicky nasazuje." }
  },
  "Základy informační bezpečnosti": {
    "Základní bezpečnostní funkce – důvěrnost, integrita, dostupnost, nepopiratelnost": { ex: "Šifrování e-mailu zajišťuje důvěrnost, kontrolní součet integritu, záložní server dostupnost a digitální podpis nepopiratelnost odeslání.", cv: "Pro únik databáze hesel, podvržení převodního příkazu a DDoS útok urči, kterou z vlastností triády CIA každý incident porušuje." },
    "Kryptografická primitiva": { ex: "Symetrická šifra AES šifruje data jedním sdíleným klíčem rychle, asymetrická RSA řeší výměnu klíče a hašovací funkce SHA-256 ověří integritu.", cv: "Ke každému primitivu (symetrická šifra, asymetrická šifra, hašovací funkce, digitální podpis) přiřaď, jaký bezpečnostní cíl plní." },
    "Kryptografické protokoly": { ex: "Protokol TLS handshake pomocí asymetrické kryptografie ustaví sdílený symetrický klíč a ověří identitu serveru – jediná chyba v jeho návrhu by jej prolomila.", cv: "Popiš v krocích, jak dvě strany pomocí asymetrické kryptografie bezpečně ustaví sdílený symetrický klíč." },
    "Řízení rizik": { ex: "Riziko ztráty notebooku lze snížit šifrováním disku, přenést pojištěním, nebo akceptovat – volba závisí na hodnotě dat a ceně opatření.", cv: "Pro firmu identifikuj jedno aktivum, jednu hrozbu a zranitelnost, odhadni dopad a navrhni přiměřené protiopatření." },
    "Audit, bezpečnostní operace, standardy": { ex: "Bezpečnostní audit nezávisle ověří, zda firma dodržuje své politiky; tým bezpečnostních operací přitom průběžně monitoruje logy a reaguje na incidenty.", cv: "Vysvětli rozdíl mezi jednorázovým auditem a průběžnými bezpečnostními operacemi a uveď roli normy řady ISO/IEC 27000." },
    "Hodnocení bezpečnosti": { ex: "Produkt se podle kritérií Common Criteria otestuje a získá úroveň záruky EAL, která vyjadřuje doloženou míru důvěry v jeho bezpečnost.", cv: "Vysvětli, k čemu slouží standardizovaná kritéria (například Common Criteria) a co vyjadřuje výsledná úroveň záruky." }
  },
  "Informační bezpečnost": {
    "Řízení identity a přístupu": { ex: "Zaměstnanec se přihlásí heslem a kódem z mobilu (vícefaktorová autentizace) a podle role účetní vidí jen účetní modul (autorizace, nejmenší oprávnění).", cv: "Navrhni pro firemní systém role a jejich oprávnění a vysvětli, jak uplatníš princip nejmenších oprávnění." },
    "Ochrana soukromí – koncepty a metody": { ex: "E-shop má podle zásady minimalizace dat sbírat jen údaje nutné k dodání zboží; ke statistikám pak používá anonymizovaná data.", cv: "Pro mobilní aplikaci navrhni, která data sbírat podle minimalizace dat, a urči, kde použít anonymizaci či pseudonymizaci." },
    "Síťové útoky": { ex: "Při útoku man-in-the-middle se útočník vloží mezi klienta a server, odposlouchává a podvrhuje data; DDoS naopak zahltí server a způsobí jeho nedostupnost.", cv: "Ke třem útokům (odposlech, man-in-the-middle, DDoS) přiřaď, kterou vlastnost triády CIA ohrožují, a navrhni ke každému obranu." },
    "Bezpečné programování a vývoj SW": { ex: "SQL injection vznikne vložením vstupu přímo do dotazu; obranou je parametrizovaný dotaz, který vstup nikdy nepovažuje za součást příkazu.", cv: "Najdi v zadaném kódu zranitelnost typu SQL injection nebo přetečení bufferu a oprav ji bezpečným postupem." },
    "Použitelná bezpečnost": { ex: "Příliš přísná politika hesel vede k tomu, že si je lidé píší na lísteček – nesrozumitelné opatření uživatelé obcházejí a bezpečnost klesá.", cv: "Navrhni přihlašování, které je bezpečné i použitelné, a vysvětli, jak vyvažuješ ochranu a pohodlí uživatele." }
  }
};

function practicalExample(title, subtopic) {
  const d = DETAIL[title] && DETAIL[title][subtopic];
  if (d && d.ex) return d.ex;
  return "Definuj pojem přesně, uveď jednu větu o jeho praktickém využití v informatice a jeden krátký kontrapříklad, kdy jeho podmínky neplatí.";
}

function practicalExercise(title, subtopic) {
  const d = DETAIL[title] && DETAIL[title][subtopic];
  if (d && d.cv) return d.cv;
  return "Připrav si 90sekundovou ústní odpověď: definice, klíčová věta nebo vlastnost, krátký výpočet či algoritmický krok a typická aplikační situace.";
}

function getCookie(name) {
  const parts = document.cookie.split(";").map(v => v.trim());
  const prefix = name + "=";
  const found = parts.find(p => p.startsWith(prefix));
  return found ? decodeURIComponent(found.slice(prefix.length)) : "";
}

function setCookie(name, value, days) {
  const expires = new Date(Date.now() + days * 86400000).toUTCString();
  document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + expires + "; path=/; SameSite=Lax";
}

function loadCompletedTitles() {
  try {
    const raw = getCookie(COMPLETED_COOKIE);
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    return new Set(Array.isArray(arr) ? arr : []);
  } catch {
    return new Set();
  }
}

function saveCompletedTitles() {
  setCookie(COMPLETED_COOKIE, JSON.stringify([...completedTitles]), COOKIE_DAYS);
}

function resetCompletion(silent = false) {
  completedTitles.clear();
  saveCompletedTitles();
  if (!silent) alert("Dokončení titulů bylo resetováno.");
}

function markTitleCompleted(title) {
  completedTitles.add(title);
  if (completedTitles.size >= TOPICS.length) {
    alert("Skvělé! Máš dokončené všechny tituly. Dokončení se nyní resetuje.");
    resetCompletion(true);
    return;
  }
  saveCompletedTitles();
}

const pickBtn = document.getElementById("pick");
pickBtn.addEventListener("click", pick);
document.getElementById("resetProgress").addEventListener("click", () => resetCompletion());
document.addEventListener("keydown", e => {
  if (e.target.tagName === "SUMMARY") return;
  if (e.code === "Space" || e.code === "Enter") {
    e.preventDefault();
    pick();
  }
});
