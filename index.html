<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1424">
<title>Náhodné téma ke státnicím</title>
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<style>
  :root {
    --bg: #0f1424;
    --card: #1a2138;
    --card-2: #232c49;
    --ink: #eef1f8;
    --muted: #9aa4c4;
    --accent: #6c8cff;
    --accent-2: #45d0a8;
    --line: #2c3556;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }
  .wrap {
    max-width: 660px;
    margin: 0 auto;
    padding: max(16px, env(safe-area-inset-top)) 16px
             calc(110px + env(safe-area-inset-bottom)) 16px;
  }

  header { text-align: center; margin: 12px 0 18px; }
  header h1 { font-size: 1.3rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  header p { margin: 0; color: var(--muted); font-size: 0.88rem; }

  .menu {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    left: max(12px, env(safe-area-inset-left));
    z-index: 10;
  }
  .menu-btn {
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    color: var(--ink);
    font-size: 1.35rem;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(0,0,0,.18);
  }
  .menu-panel {
    display: none;
    width: min(280px, calc(100vw - 24px));
    margin-top: 8px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--card);
    box-shadow: 0 14px 34px rgba(0,0,0,.34);
  }
  .menu.open .menu-panel { display: block; }
  .menu-label {
    display: block;
    margin: 0 0 6px;
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .menu-panel select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card-2);
    color: var(--ink);
    font: inherit;
    font-size: 0.92rem;
    padding: 10px 12px;
  }

  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 18px;
  }
  .chip {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s, color .15s, border-color .15s;
  }
  .chip[aria-pressed="true"] {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .welcome { text-align: center; padding: 36px 18px; color: var(--muted); }
  .welcome .dice { font-size: 3.2rem; line-height: 1; margin-bottom: 10px; }
  .welcome p { margin: 6px 0 0; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 18px 22px;
    animation: pop .28s ease;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(10px) scale(.99); }
    to   { opacity: 1; transform: none; }
  }
  .card .cat {
    display: inline-block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent-2);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card h2 { margin: 0 0 14px; font-size: 1.45rem; letter-spacing: -0.02em; }

  .section-label {
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    font-weight: 700;
    margin: 0 0 6px;
  }
  .definition {
    background: var(--card-2);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 13px 15px;
    font-size: 1.02rem;
    margin: 0;
  }

  .scope-head {
    display: flex; align-items: center;
    justify-content: space-between; gap: 10px;
    flex-wrap: wrap;
    margin: 20px 0 6px;
  }
  .toggle {
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.74rem;
    padding: 5px 11px;
    border-radius: 999px;
    cursor: pointer;
  }

  details.sub {
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-top: 8px;
    background: var(--card-2);
    overflow: hidden;
  }
  details.sub summary {
    cursor: pointer;
    padding: 11px 36px 11px 13px;
    font-weight: 600;
    font-size: 0.97rem;
    list-style: none;
    position: relative;
  }
  details.sub summary::-webkit-details-marker { display: none; }
  details.sub summary::after {
    content: "+";
    position: absolute;
    right: 13px; top: 10px;
    color: var(--muted);
    font-size: 1.15rem;
    line-height: 1;
  }
  details.sub[open] summary::after { content: "\2212"; }
  .sub-def {
    margin: 0;
    padding: 0 13px 13px;
    color: var(--muted);
    font-size: 0.93rem;
  }

  .codes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 18px; }
  .code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.77rem;
    background: var(--card-2);
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 4px 9px;
    border-radius: 7px;
  }

  .progress {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    margin: 16px 0 0;
  }
  .actions {
    margin-top: 10px;
    text-align: center;
  }
  .actions .toggle {
    font-size: 0.78rem;
  }
  .sub-extra {
    margin: 0;
    padding: 0 13px 13px;
    color: var(--ink);
    font-size: 0.9rem;
    border-top: 1px solid var(--line);
  }
  .sub-extra strong { color: var(--accent-2); }
  .sub-prompt { margin: 0; }
  .sol-btn {
    display: inline-block;
    margin-top: 7px;
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 999px;
    cursor: pointer;
  }
  .sol-btn[aria-expanded="true"] {
    color: var(--accent-2);
    border-color: var(--accent-2);
  }
  .sol {
    display: none;
    margin: 8px 0 0;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .sol.open { display: block; }
  .sol strong { color: var(--accent-2); }

  .bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 72%, transparent);
  }
  .bar .inner { max-width: 660px; margin: 0 auto; }
  button.pick {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: inherit;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), #8a6cff);
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(108,140,255,.35);
    transition: transform .08s;
  }
  button.pick:active { transform: scale(.98); }
</style>
</head>
<body>
<div class="menu" id="datasetMenu">
  <button class="menu-btn" id="menuToggle" aria-label="Otevřít výběr souboru" aria-expanded="false" type="button">☰</button>
  <div class="menu-panel">
    <label class="menu-label" for="datasetSelect">Soubor témat</label>
    <select id="datasetSelect" aria-label="Vybrat soubor s tématy"></select>
  </div>
</div>

<div class="wrap">
  <header>
    <h1>🎲 Náhodné téma ke státnicím</h1>
    <p><span id="count"></span> okruhů · definice + rozbor po dílčích pojmech</p>
  </header>

  <div class="filters" id="filters"></div>

  <main id="stage">
    <div class="welcome">
      <div class="dice">🎯</div>
      <p>Klepni na tlačítko dole a vylosuje se ti náhodný okruh.</p>
      <p>Dostaneš souhrnnou definici a ke každému dílčímu pojmu samostatné vysvětlení.</p>
    </div>
  </main>

  <p class="progress" id="progress"></p>
  <div class="actions">
    <button class="toggle" id="resetProgress">Resetovat dokončení</button>
  </div>
</div>

<div class="bar">
  <div class="inner">
    <button class="pick" id="pick">Vybrat náhodné téma</button>
  </div>
</div>

<script src="Informatika.js"></script>
<script src="PVA.js"></script>
<script src="CS.js"></script>
<script src="vendor/katex/katex.min.js"></script>
<script src="vendor/katex/contrib/auto-render.min.js"></script>
<script>
const DATASETS = window.STUDY_DATASETS || [];
const DATASET_BY_ID = new Map();
const TOPICS = [];
const DETAIL = new Map();
const SOLUTIONS = new Map();

function dataKey(datasetId, title, subtopic) {
  return datasetId + "\u0000" + title + "\u0000" + subtopic;
}

DATASETS.forEach((dataset, datasetIndex) => {
  const datasetId = dataset.id || String(datasetIndex);
  dataset.id = datasetId;
  DATASET_BY_ID.set(datasetId, dataset);
  (dataset.topics || []).forEach(topic => {
    TOPICS.push({ ...topic, datasetId });

    const topicDetail = (dataset.detail && dataset.detail[topic.title]) || {};
    Object.entries(topicDetail).forEach(([subtopic, value]) => {
      DETAIL.set(dataKey(datasetId, topic.title, subtopic), value);
    });

    const topicSolutions = (dataset.solutions && dataset.solutions[topic.title]) || {};
    Object.entries(topicSolutions).forEach(([subtopic, value]) => {
      SOLUTIONS.set(dataKey(datasetId, topic.title, subtopic), value);
    });
  });
});

function categoryLabel(name) {
  const dataset = DATASET_BY_ID.get(activeDatasetId);
  return (dataset && dataset.categoryLabels && dataset.categoryLabels[name]) || name;
}

let activeDatasetId = DATASETS[0] && DATASETS[0].id;
let activeFilter = "Vše";
const roundState = new Map();
const COMPLETED_COOKIE = "completedTitles";
const COOKIE_DAYS = 365;
let completedTitles = loadCompletedTitles();

const datasetSelect = document.getElementById("datasetSelect");
const datasetMenu = document.getElementById("datasetMenu");
const menuToggle = document.getElementById("menuToggle");
DATASETS.forEach(dataset => {
  const option = document.createElement("option");
  option.value = dataset.id;
  option.textContent = dataset.name || dataset.id;
  datasetSelect.appendChild(option);
});
datasetSelect.value = activeDatasetId || "";
datasetSelect.addEventListener("change", () => {
  activeDatasetId = datasetSelect.value;
  activeFilter = "Vše";
  renderFilters();
  resetStage();
  updateCount();
  closeMenu();
});

function openMenu() {
  datasetMenu.classList.add("open");
  menuToggle.setAttribute("aria-expanded", "true");
}

function closeMenu() {
  datasetMenu.classList.remove("open");
  menuToggle.setAttribute("aria-expanded", "false");
}

menuToggle.addEventListener("click", () => {
  if (datasetMenu.classList.contains("open")) closeMenu();
  else openMenu();
});

document.addEventListener("click", e => {
  if (!datasetMenu.contains(e.target)) closeMenu();
});

document.addEventListener("keydown", e => {
  if (e.code === "Escape") closeMenu();
});

const filtersEl = document.getElementById("filters");

function updateCount() {
  document.getElementById("count").textContent = String(datasetTopics().length);
}

function datasetTopics(datasetId = activeDatasetId) {
  return TOPICS.filter(t => t.datasetId === datasetId);
}

function datasetCategories() {
  return [...new Set(datasetTopics().map(t => t.cat))];
}

function renderFilters() {
  filtersEl.innerHTML = "";
  ["Vše", ...datasetCategories()].forEach(name => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.textContent = categoryLabel(name);
    btn.title = name;
    btn.setAttribute("aria-pressed", String(name === activeFilter));
    btn.addEventListener("click", () => {
      activeFilter = name;
      [...filtersEl.children].forEach(c => c.setAttribute("aria-pressed", String(c === btn)));
      pick();
    });
    filtersEl.appendChild(btn);
  });
}

function resetStage() {
  document.getElementById("stage").innerHTML =
    '<div class="welcome"><div class="dice">🎯</div><p>Klepni na tlačítko dole a vylosuje se ti náhodný okruh.</p><p>Dostaneš souhrnnou definici a ke každému dílčímu pojmu samostatné vysvětlení.</p></div>';
  document.getElementById("progress").textContent = "";
}

updateCount();
renderFilters();

function stateFor(filter) {
  const key = activeDatasetId + "\u0000" + filter;
  if (!roundState.has(key)) {
    roundState.set(key, { bag: [], lastIndex: -1 });
  }
  return roundState.get(key);
}

function pool(filter = activeFilter) {
  return TOPICS
    .map((t, i) => i)
    .filter(i => TOPICS[i].datasetId === activeDatasetId)
    .filter(i => filter === "Vše" || TOPICS[i].cat === filter);
}

function refillBag(state, filter) {
  state.bag = pool(filter);
  for (let i = state.bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.bag[i], state.bag[j]] = [state.bag[j], state.bag[i]];
  }
  if (state.bag.length > 1 && state.bag[state.bag.length - 1] === state.lastIndex) {
    [state.bag[0], state.bag[state.bag.length - 1]] = [state.bag[state.bag.length - 1], state.bag[0]];
  }
}

function pick() {
  const filter = activeFilter;
  const state = stateFor(filter);
  if (state.bag.length === 0) refillBag(state, filter);
  const idx = state.bag.pop();
  state.lastIndex = idx;
  render(TOPICS[idx]);
  markTitleCompleted(TOPICS[idx]);

  const total = pool(filter).length;
  const done = total - state.bag.length;
  document.getElementById("progress").textContent =
    "Téma " + done + " z " + total + " v tomto kole" +
    (state.bag.length === 0 ? " · kolo se zamíchá" : "") +
    " · dokončeno titulů: " + completedCount() + " z " + datasetTopics().length;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function plural(n) {
  if (n === 1) return "pojem";
  if (n >= 2 && n <= 4) return "pojmy";
  return "pojmů";
}

function render(topic) {
  const card = el("article", "card");
  card.appendChild(el("span", "cat", topic.cat));
  card.appendChild(el("h2", null, topic.title));

  card.appendChild(el("div", "section-label", "Souhrnná definice"));
  card.appendChild(el("p", "definition", topic.def));

  const head = el("div", "scope-head");
  head.appendChild(el("div", "section-label",
    "Rozbor po dílčích pojmech · " + topic.scope.length + " " + plural(topic.scope.length)));
  const toggle = el("button", "toggle", "Skrýt definice");
  head.appendChild(toggle);
  card.appendChild(head);

  const subs = [];
  topic.scope.forEach(s => {
    const d = document.createElement("details");
    d.className = "sub";
    d.open = true;
    d.appendChild(el("summary", null, s.t));
    d.appendChild(el("p", "sub-def", s.d));
    d.appendChild(makeExtra("Praktický příklad",
      practicalExample(topic, s.t), exampleSolution(topic, s.t)));
    d.appendChild(makeExtra("Cvičení",
      practicalExercise(topic, s.t), exerciseSolution(topic, s.t)));
    card.appendChild(d);
    subs.push(d);
  });

  toggle.addEventListener("click", () => {
    const anyOpen = subs.some(d => d.open);
    subs.forEach(d => d.open = !anyOpen);
    toggle.textContent = anyOpen ? "Zobrazit definice" : "Skrýt definice";
  });

  const codes = el("div", "codes");
  topic.codes.forEach(c => codes.appendChild(el("span", "code", c)));
  card.appendChild(codes);

  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  stage.appendChild(card);
  typesetMath(card);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function typesetMath(root) {
  if (typeof renderMathInElement !== "function") return;
  renderMathInElement(root, {
    delimiters: [
      { left: "$$", right: "$$", display: true },
      { left: "\\(", right: "\\)", display: false }
    ],
    throwOnError: false,
    ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code", "option"]
  });
}

function detailFor(topic, subtopic) {
  return DETAIL.get(dataKey(topic.datasetId, topic.title, subtopic));
}

function solutionFor(topic, subtopic) {
  return SOLUTIONS.get(dataKey(topic.datasetId, topic.title, subtopic));
}

function practicalExample(topic, subtopic) {
  const d = detailFor(topic, subtopic);
  if (d && d.ex) return d.ex;
  return "Definuj pojem přesně, uveď jednu větu o jeho praktickém využití v informatice a jeden krátký kontrapříklad, kdy jeho podmínky neplatí.";
}

function practicalExercise(topic, subtopic) {
  const d = detailFor(topic, subtopic);
  if (d && d.cv) return d.cv;
  return "Připrav si 90sekundovou ústní odpověď: definice, klíčová věta nebo vlastnost, krátký výpočet či algoritmický krok a typická aplikační situace.";
}

function exampleSolution(topic, subtopic) {
  const d = solutionFor(topic, subtopic);
  if (d && d.ex) return d.ex;
  return "Postup: vyjdi z přesné definice pojmu, proveď uvedený výpočet či konstrukci krok za krokem a výsledek interpretuj v kontextu zadání.";
}

function exerciseSolution(topic, subtopic) {
  const d = solutionFor(topic, subtopic);
  if (d && d.cv) return d.cv;
  return "Postup: rozeber zadání na dílčí kroky, každý proveď s odůvodněním a na závěr ověř, že výsledek odpovídá očekávání.";
}

function makeExtra(label, prompt, solution) {
  const wrap = el("div", "sub-extra");
  const p = el("p", "sub-prompt");
  p.innerHTML = "<strong>" + label + ":</strong> " + prompt;
  wrap.appendChild(p);
  const btn = el("button", "sol-btn", "Zobrazit řešení");
  btn.setAttribute("aria-expanded", "false");
  const sol = el("div", "sol");
  sol.innerHTML = "<strong>Řešení:</strong> " + solution;
  btn.addEventListener("click", () => {
    const open = sol.classList.toggle("open");
    btn.setAttribute("aria-expanded", String(open));
    btn.textContent = open ? "Skrýt řešení" : "Zobrazit řešení";
  });
  wrap.appendChild(btn);
  wrap.appendChild(sol);
  return wrap;
}

function getCookie(name) {
  const parts = document.cookie.split(";").map(v => v.trim());
  const prefix = name + "=";
  const found = parts.find(p => p.startsWith(prefix));
  return found ? decodeURIComponent(found.slice(prefix.length)) : "";
}

function setCookie(name, value, days) {
  const expires = new Date(Date.now() + days * 86400000).toUTCString();
  document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + expires + "; path=/; SameSite=Lax";
}

function loadCompletedTitles() {
  try {
    const raw = getCookie(COMPLETED_COOKIE);
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    return new Set(Array.isArray(arr) ? arr : []);
  } catch {
    return new Set();
  }
}

function saveCompletedTitles() {
  setCookie(COMPLETED_COOKIE, JSON.stringify([...completedTitles]), COOKIE_DAYS);
}

function completedKey(topic) {
  return topic.datasetId + "\u0000" + topic.title;
}

function completedCount(datasetId = activeDatasetId) {
  return datasetTopics(datasetId).filter(topic => completedTitles.has(completedKey(topic))).length;
}

function resetCompletion(silent = false) {
  completedTitles.clear();
  saveCompletedTitles();
  if (!silent) alert("Dokončení titulů bylo resetováno.");
}

function markTitleCompleted(topic) {
  completedTitles.add(completedKey(topic));
  if (completedCount(topic.datasetId) >= datasetTopics(topic.datasetId).length) {
    alert("Skvělé! Máš dokončené všechny tituly. Dokončení se nyní resetuje.");
    resetCompletion(true);
    return;
  }
  saveCompletedTitles();
}

const pickBtn = document.getElementById("pick");
pickBtn.addEventListener("click", pick);
document.getElementById("resetProgress").addEventListener("click", () => resetCompletion());
document.addEventListener("keydown", e => {
  if (e.target.tagName === "SUMMARY") return;
  if (e.code === "Space" || e.code === "Enter") {
    e.preventDefault();
    pick();
  }
});
</script>
</body>
</html>
