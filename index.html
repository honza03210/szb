    "Typy grafů": { ex: "Silniční síť: města jsou vrcholy, silnice hrany bez směru s délkou jako vahou ⇒ neorientovaný ohodnocený graf. Závislosti úkolů mají směr a nesmějí tvořit cyklus ⇒ orientovaný acyklický graf. Rodokmen je souvislý a bez cyklů ⇒ strom.", cv: "Přátelství je vzájemné ⇒ neorientovaný graf. Odkazy mezi stránkami mají směr (A odkazuje na B, opačně nemusí) ⇒ orientovaný graf. Potrubí s průtoky má u každé trubky směr toku i číselný průtok ⇒ orientovaný ohodnocený graf." },
    "Stromy": { ex: "Strom je souvislý a bez cyklů, proto má strom s n vrcholy vždy n−1 hran (zde 6−1=5). Mezi každými dvěma vrcholy vede právě jedna cesta; přidání další hrany spojí dva už propojené vrcholy, čímž vznikne cyklus.", cv: "Strom se 7 vrcholy má přesně 7−1 = 6 hran. Cesta mezi dvěma listy je jediná – vede přes jejich nejbližšího společného předka. Přidání hrany mezi dva libovolné vrcholy by vytvořilo cyklus." },
    "Stupně vrcholů": { ex: "Stupeň vrcholu je počet hran z něj vedoucích. V trojúhelníku ABC má každý vrchol stupeň 2 a součet stupňů je 6. Princip podání rukou: každá hrana přispěje do součtu stupňů dvakrát, takže součet = 2·(počet hran) = 2·3.", cv: "Součet stupňů = 3+3+2+2+2 = 12. Podle principu podání rukou je součet stupňů roven dvojnásobku počtu hran, takže hran je 12/2 = 6. Součet je sudé číslo, takže takový graf může existovat." },
    "Orientované grafy": { ex: "Hrana A→B v grafu závislostí znamená, že A musí předcházet B. Orientovaný cyklus by způsobil, že každá úloha v něm nepřímo čeká sama na sebe – závislosti by nešlo splnit a úlohy by byly neřešitelné.", cv: "Každý vrchol má jednu příchozí a jednu odchozí hranu, takže vstupní i výstupní stupeň je u všech tří vrcholů roven 1. Hrany A→B→C→A tvoří orientovaný cyklus – ten v grafu existuje." },
    "Reprezentace grafů": { ex: "Matice sousednosti grafu se 4 vrcholy má 4×4 = 16 buněk bez ohledu na počet hran – je rychlá na dotaz „existuje hrana?“, ale paměťově náročná. Seznamy sousedů ukládají jen skutečné hrany, takže pro řídký graf jsou úspornější.", cv: "Matice sousednosti má jedničky na pozicích (1,2),(2,1),(2,3),(3,2),(3,4),(4,3),(1,4),(4,1), jinde nuly. Seznamy sousedů: 1:[2,4], 2:[1,3], 3:[2,4], 4:[3,1]. Matice má 16 buněk, seznamy jen 8 položek – pro tento řídký graf úspornější." },
    "Algoritmy prohledávání do hloubky a do šířky a jejich využití": { ex: "BFS používá frontu a navštěvuje vrcholy po vrstvách podle vzdálenosti od startu, proto v neohodnoceném grafu najde cestu s nejmenším počtem hran. DFS jde co nejhlouběji pomocí zásobníku či rekurze; hrana zpět na vrchol na aktuální cestě odhalí cyklus.", cv: "BFS od A: zařadíme A, pak jeho sousedy, pak sousedy sousedů – pořadí je po vrstvách podle vzdálenosti. DFS od A: jdeme co nejhlouběji jednou větví a teprve při zaseknutí se vracíme (backtracking). Oba projdou všech 7 vrcholů v lineárním čase, ale v jiném pořadí." },
    "Komponenty souvislosti": { ex: "Komponenta je maximální množina vzájemně dosažitelných vrcholů. V grafu s hranami AB a CD nelze přejít z {A,B} do {C,D}, jde tedy o dvě komponenty. Najdeme je tak, že spustíme DFS z A a poté znovu z prvního nenavštíveného vrcholu.", cv: "Hrany AB a BC spojují A, B, C; hrana DE spojuje D, E; vrchol F nemá žádnou hranu. Komponenty jsou tedy tři: {A,B,C}, {D,E} a {F}. Najdeme je opakovaným spuštěním DFS z dosud nenavštíveného vrcholu." }
  },
  "Grafové algoritmy": {
    "Ohodnocené grafy": { ex: "Ve váženém grafu nese každá hrana číslo – u mapy měst vzdálenost v km. Pouhá existence cesty pak nestačí: mezi dvěma městy může vést více cest a zajímá nás ta s nejmenším součtem vah.", cv: "Stačí nakreslit 4 vrcholy a hrany s kladnými vahami, například AB=10, AC=25, BC=15, CD=8, BD=30. Nejdražší je hrana s nejvyšší vahou – zde BD s váhou 30." },
    "Definice nejkratší cesty": { ex: "Přímá hrana A→B má váhu 5, ale cesta A→C→B má váhu 2+1=3. Nejkratší cesta je ta s nejmenším součtem vah hran, nikoli ta s nejmenším počtem hran – proto vede přes vrchol C.", cv: "Nejkratší cestu najdeme porovnáním součtů vah všech cest mezi danými vrcholy a vybereme minimum. Obsahuje-li graf na cestě záporný cyklus, lze cyklus opakovat a součet vah neomezeně snižovat – minimum neexistuje, cesta tedy není definována." },
    "Minimální kostry grafu": { ex: "Kostra propojuje všechny vrcholy a je stromem (bez cyklu), má proto n−1 hran. Minimální kostra je ta s nejmenším součtem vah – u sítě měst odpovídá nejlevnějšímu způsobu, jak je všechna propojit kabelem.", cv: "Hladově přidáváme nejlevnější hrany, které nevytvoří cyklus, dokud nemáme n−1 = 4 hrany spojující všech 5 vrcholů. Celková váha kostry je součet vah těchto čtyř vybraných hran." },
    "Algoritmy pro hledání nejkratších cest (Dijkstra, Bellman–Ford)": { ex: "Dijkstrův algoritmus opakovaně vybírá nejbližší dosud nezpracovaný vrchol a relaxuje jeho hrany. Funguje jen pro nezáporné váhy – záporná hrana by mohla zlevnit cestu k už uzavřenému vrcholu. Pro záporné váhy slouží Bellman–Ford.", cv: "Začneme vzdáleností 0 u A a ∞ u ostatních. Opakovaně vybereme nejbližší neuzavřený vrchol a relaxujeme jeho hrany (zmenšíme vzdálenost souseda, je-li cesta přes daný vrchol kratší). Po zpracování všech vrcholů obsahuje tabulka nejkratší vzdálenosti z A." },
    "Algoritmy pro hledání minimálních koster": { ex: "Kruskal třídí hrany podle váhy a přidává nejlevnější, které nevytvoří cyklus (cyklus hlídá struktura union-find). Prim nechává strom růst z jednoho vrcholu a vždy přidá nejlevnější hranu vedoucí ven. Oba jsou hladové a díky řezovému lemmatu optimální.", cv: "Kruskal: seřadíme hrany vzestupně a bereme je, pokud nevytvoří cyklus, dokud nespojí všechny vrcholy. Prim: od jednoho vrcholu opakovaně přidáme nejlevnější hranu vedoucí mimo dosavadní strom. Oba dají kostru se stejnou minimální celkovou váhou." }
  },
  "Stromové datové struktury": {
    "Binární vyhledávací stromy": { ex: "Při vkládání 5,3,8,1,4 jde 3 vlevo od 5, 8 vpravo, 1 vlevo od 3, 4 vpravo od 3. Hledání 4: 5 (menší → vlevo), 3 (větší → vpravo), nález. Vzestupná posloupnost 1,2,3,4,5 vkládá každý prvek vpravo ⇒ strom degeneruje na seznam.", cv: "7 je kořen; 3 jde vlevo (menší), 9 vpravo (větší); 1 vlevo od 3; 5 vpravo od 3; 8 vlevo od 9. Hledání klíče 5: 7 (5 je menší → vlevo), 3 (5 je větší → vpravo), 5 – nález po 3 porovnáních." },
    "B-stromy": { ex: "Index nad milionem záznamů má v B-stromu hloubku jen 3–4, protože každý uzel má mnoho potomků (vysoký větvící faktor). Jeden uzel odpovídá diskovému bloku, takže nalezení záznamu vyžaduje jen 3–4 pomalá čtení z disku.", cv: "Uzel pojme nejvýše 2 klíče. Vložením 1, 2 vznikne uzel [1,2]; vložení 3 ho přeplní, prostřední klíč 2 vystoupí jako nový kořen a vzniknou listy [1] a [3]. Stejně se uzel rozštěpí při každém dalším přeplnění – strom roste vyváženě od kořene." },
    "Červeno-černé stromy": { ex: "Poruší-li nový červený uzel pravidlo „dva červené uzly nesmějí být za sebou“, strom situaci napraví: přebarví uzly, případně provede jednu rotaci. Tím se obnoví barevné invarianty a strom zůstane vyvážený, aniž by se přebudovával.", cv: "Pravidla žádají, aby každá cesta od uzlu k listům obsahovala stejný počet černých uzlů a aby se červené uzly neopakovaly za sebou. Nejkratší cesta může být celá černá, nejdelší střídá černá–červená – má tedy nejvýše dvojnásobek uzlů, proto je hloubka logaritmická." },
    "Haldy": { ex: "V min-haldě je každý rodič menší nebo roven svým potomkům, takže nejmenší prvek je vždy v kořeni a získáme ho v konstantním čase. Pole [1,3,2,7,4] tuto vlastnost splňuje: 1≤3, 1≤2, 3≤7, 3≤4.", cv: "Stavbou haldy z [9,4,7,1,−2,6,5] vznikne min-halda s kořenem −2. Extract-min: vyjmeme −2, na kořen dáme poslední prvek a probubláme dolů ⇒ kořenem se stane 1. Druhý extract-min vyjme 1 a po probublání je kořenem 4. Každá operace trvá O(log n)." },
    "Související operace a jejich složitost": { ex: "Ve vyváženém BST je hloubka O(log n), takže hledání projde nejvýše log n uzlů. Zvrhne-li se BST na seznam (například vkládáním seřazených dat), je hloubka n a hledání trvá O(n) – proto se používají samovyvažující stromy.", cv: "Vyvážený BST: search, insert i delete vše O(log n). Nevyvážený BST: tytéž operace v nejhorším případě O(n). Halda: nalezení minima O(1), insert a extract-min O(log n), hledání obecného prvku O(n)." },
    "Typické implementace a příklady použití": { ex: "Vyvážené stromy udržují prvky seřazené a umožňují rychlé hledání – proto implementují množiny a slovníky (std::map). B-stromy minimalizují diskové přístupy ⇒ databázové indexy. Halda dává rychlý přístup k minimu ⇒ prioritní fronta v Dijkstrově algoritmu.", cv: "Slovník (mapa klíč→hodnota): vyvážený binární vyhledávací strom, nebo hašovací tabulka. Prioritní fronta: halda – rychlé vložení i odebrání prvku s nejvyšší prioritou. Databázový index: B-strom, protože minimalizuje počet čtení diskových bloků." }
  },
  "Návrh algoritmů": {
    "Metoda rozděl a panuj": { ex: "Binární vyhledávání porovná hledaný prvek s prostředním: je-li menší, hledá v levé polovině, jinak v pravé. Každý krok zahodí polovinu dat, takže po log₂n krocích zbude jediný prvek – odtud složitost O(log n).", cv: "Rozdělení: pole se rozpůlí na dvě poloviny. Řešení: každá polovina se rekurzivně seřadí mergesortem. Sloučení: dvě seřazené poloviny se slijí v lineárním čase. Rekurence T(n)=2·T(n/2)+O(n) dává složitost O(n log n)." },
    "Výhody a nevýhody použití rekurze": { ex: "Rekurzivní fib(n)=fib(n−1)+fib(n−2) volá tytéž podproblémy znovu a znovu – počet volání roste exponenciálně. Memoizace (uložení už spočtených hodnot) nebo převod na iteraci tuto duplicitu odstraní.", cv: "Funkce: fact(n) = (n=0) ? 1 : n·fact(n−1). Každé volání zabere jeden rámec na zásobníku; při velmi velkém n (řádově desetitisíce volání podle limitu zásobníku) zásobník přeteče a program spadne. Bezpečnější je iterativní verze." },
    "Odstranění rekurze": { ex: "Koncová rekurze, kde je rekurzivní volání poslední operací, se převede na prostý cyklus. Obecná rekurze (například průchod stromem do obou potomků) se nahradí explicitním zásobníkem, do nějž ukládáme, co ještě zbývá zpracovat.", cv: "Iterativně: výsledek = 1; pro i od 2 do n opakuj výsledek = výsledek·i; vrať výsledek. Ušetří se režie volání funkcí a spotřeba zásobníku – iterativní verze používá konstantní paměť a nehrozí přetečení zásobníku." },
    "Řadicí rekurzivní algoritmy": { ex: "Mergesort dělí pole vždy přesně na poloviny, proto má spolehlivě O(n log n). Quicksort dělí podle pivotu; vyjde-li pivot vždy krajní (například na seřazeném poli s prvním prvkem jako pivotem), jsou části velikosti 0 a n−1 ⇒ O(n²).", cv: "Mergesort: [5,2,8,1,9,3] → [5,2,8] a [1,9,3] → rekurzivně seřadit na [2,5,8] a [1,3,9] → sloučit na [1,2,3,5,8,9]. Quicksort s pivotem 5: menší [2,1,3], větší [8,9] → rekurzivně [1,2,3] a [8,9] → výsledek [1,2,3,5,8,9]." },
    "Vztah rekurze a matematické indukce": { ex: "Rekurzivní algoritmus i indukční důkaz mají stejnou kostru: ukončovací podmínka odpovídá bázi indukce, rekurzivní volání na menším vstupu indukčnímu kroku. Protože se velikost problému s každým voláním zmenšuje, indukce zaručuje i konečnost výpočtu.", cv: "Báze: sum(0)=0 = 0·1/2 ✓. Indukční krok: předpokládejme sum(n−1)=(n−1)·n/2. Pak sum(n)=n+sum(n−1)=n+(n−1)·n/2 = (2n+n²−n)/2 = (n²+n)/2 = n(n+1)/2. ✓ Tvrzení platí pro všechna n." }
  },
  "Funkcionální programování": {
    "Funkcionální programovací paradigma": { ex: "Funkce délka seznamu je definovaná jen pomocí vstupu a rekurze, bez měnitelné proměnné. Díky referenční transparentnosti vrátí pro stejný vstup vždy stejný výsledek – snáz se uvažuje o správnosti a výpočet lze paralelizovat.", cv: "Imperativně: zavedeme proměnnou součet=0 a cyklem ji v každém kroku měníme (součet = součet + prvek) – stav se mění. Funkcionálně: foldr (+) 0 seznam – fold rekurzivně sloučí prvky do jediné hodnoty bez měnitelné proměnné a bez cyklu." },
    "Princip výpočtu a redukční krok": { ex: "Redex je část výrazu, kterou lze přepsat. (λx. x+1) 4 má redex celé aplikace: dosadíme 4 za x a vznikne 4+1; to je další redex, jehož přepisem získáme 5 – normální tvar, který je výsledkem.", cv: "double (double 3) → double (3+3) → double 6 → 6+6 → 12. Každý krok přepíše jeden redex podle definice double x = x+x; po vyčerpání redexů zůstane normální tvar 12." },
    "Redukční strategie a jejich vlastnosti": { ex: "fst (3, ⊥) vrací první složku dvojice. Líná strategie vyhodnocuje argument až při potřebě – druhá složka ⊥ se nikdy nevyžádá a výsledek je 3. Striktní strategie vyhodnotí oba argumenty předem, narazí na ⊥ a zacyklí se.", cv: "Vezměme const x y = x a výraz const 5 nekonečnýVýpočet. Líná (normální) strategie druhý argument nikdy nevyhodnotí a vrátí 5. Striktní (aplikační) strategie nejdřív vyhodnocuje oba argumenty – druhý se nedopočítá a výpočet se zacyklí." },
    "Funkce vyšších řádů a jejich využití": { ex: "map aplikuje funkci na všechny prvky: map (*2) [1,2,3] = [2,4,6]. filter ponechá prvky splňující podmínku: filter even [1..6] = [2,4,6]. foldr sloučí prvky jednou operací: foldr (+) 0 [1,2,3] = 1+(2+(3+0)) = 6.", cv: "foldr (+) 0 (map (^2) (filter even [1..10])). filter even [1..10] = [2,4,6,8,10]; map (^2) z toho udělá [4,16,36,64,100]; foldr (+) 0 sečte na výsledek 220." },
    "Nepojmenované funkce": { ex: "Krátkou jednorázovou funkci není nutné pojmenovávat – přímo na místě použití se zapíše lambda. Místo definice square x = x·x se ve volání map napíše λx → x·x. Pojem pochází z lambda kalkulu, teoretického základu funkcionálního programování.", cv: "Pojmenovaná funkce inc x = x+1 odpovídá lambda výrazu λx → x+1 (v Haskellu zapsanému jako anonymní funkce). Volání map (λx → x+1) [1,2,3] dá výsledek [2,3,4]." },
    "Elementární programování v Haskellu": { ex: "Funkce v Haskellu se definuje rovnicemi s pattern matchingem. length [] = 0 pokrývá prázdný seznam (báze rekurze); length (_:xs) = 1 + length xs zpracuje neprázdný seznam – jednička za hlavu plus délka zbytku.", cv: "sumList [] = 0; sumList (x:xs) = x + sumList xs. První rovnice (báze) řeší prázdný seznam, druhá vezme hlavu x a přičte k ní rekurzivně spočtený součet zbytku xs." }
  },
  "Regulární jazyky": {
    "Chomského hierarchie formálních jazyků": { ex: "Slova nad {a,b} sudé délky pozná konečný automat (stačí pamatovat paritu délky) ⇒ regulární, typ 3. Jazyk aⁿbⁿ vyžaduje počítat a, na to stačí zásobník ⇒ bezkontextový, typ 2. aⁿbⁿcⁿ vyžaduje hlídat tři počty zároveň – zásobník nestačí.", cv: "„Slova obsahující ab“ pozná konečný automat ⇒ regulární, typ 3. aⁿbⁿ vyžaduje porovnat dva počty, na to stačí zásobníkový automat ⇒ bezkontextový, typ 2. aⁿbⁿcⁿ vyžaduje porovnat tři počty – ani zásobníkový automat nestačí, jazyk je až kontextový, typ 1." },
    "Regulární jazyky, jejich reprezentace a převody": { ex: "Tři reprezentace jsou ekvivalentní: regulární výraz, pravolineární gramatika a konečný automat popisují přesně tutéž třídu jazyků. Mezi nimi existují algoritmické převody, například z regulárního výrazu na automat Thompsonovou konstrukcí.", cv: "Automat má 3 stavy: q0 (počáteční), q1, q2 (přijímající). Z q0 přes b zpět do q0, přes a do q1. Z q1 přes a zpět do q1, přes b do q2. Z q2 přes a do q1, přes b do q0. Automat přijímá právě slova končící dvojicí „ab“." },
    "Varianty konečných automatů": { ex: "Konečný automat má stavy, abecedu, přechodovou funkci, počáteční a přijímající stavy. DKA má pro stav a symbol právě jeden přechod, NKA může mít více, NKA s ε-přechody navíc přechody bez čtení symbolu. Všechny varianty rozpoznávají regulární jazyky.", cv: "Stavy odpovídají zbytku po dělení 3: s0, s1, s2 (s0 je počáteční i přijímající). Přečtení bitu b znamená nové číslo 2·staré+b: ze s0 přes 0→s0, 1→s1; ze s1 přes 0→s2, 1→s0; ze s2 přes 0→s1, 1→s2. Slovo je přijato, skončí-li ve stavu s0." },
    "Nedeterminismus a determinizace automatů": { ex: "NKA pro slova končící na „ab“ má 3 stavy a může „uhodnout“, kde začíná koncové ab. Podmnožinová konstrukce vytvoří DKA, jehož stavy jsou množiny stavů NKA – tedy které stavy NKA mohou být po přečtení daného prefixu aktivní.", cv: "Stav výsledného DKA je množina současně dosažitelných stavů NKA. Začneme množinou s počátečním stavem; pro každý symbol spočítáme množinu nástupců a postup opakujeme, dokud vznikají nové množiny. DKA přijímá, obsahuje-li množina přijímající stav NKA; počet stavů může vzrůst exponenciálně." },
    "Uzávěrové vlastnosti regulárních jazyků": { ex: "Uzavřenost se dokazuje konstrukcí: pro průnik se sestrojí součinový automat, pro doplněk se prohodí přijímající a nepřijímající stavy DKA, pro sjednocení a zřetězení se automaty pospojují. Výsledkem je vždy opět konečný automat, jazyk je tedy regulární.", cv: "Předpokládejme, že L=aⁿbⁿ je regulární s konstantou p z pumping lemmatu. Vezmeme slovo aᵖbᵖ. Lemma rozdělí slovo na xyz, kde y leží v prvních p znacích, tedy y=aᵏ s k≥1. Napumpováním vznikne aᵖ⁺ᵏbᵖ, kde počty a a b nesouhlasí – slovo do L nepatří. Spor ⇒ L není regulární." }
  },
  "Bezkontextové jazyky a jejich reprezentace": {
    "Varianty zásobníkových automatů": { ex: "Při čtení „(“ automat uloží značku na zásobník, při „)“ jednu značku odebere. Slovo přijme, je-li zásobník na konci prázdný a žádné „)“ nepřišlo navíc. Zásobník mu dává neomezenou paměť – konečný automat by hloubku vnoření neuhlídal.", cv: "Při čtení každého a uloží automat na zásobník symbol A. Při prvním b přepne do druhé fáze a při každém b jeden A odebere. Slovo aⁿbⁿ přijme, dojdou-li vstup i zásobník současně – tím ověří, že počet a a b je stejný." },
    "Metody akceptování": { ex: "Tentýž jazyk lze přijímat dvěma způsoby: dosažením přijímajícího stavu, nebo úplným vyprázdněním zásobníku. Pro nedeterministické zásobníkové automaty jsou obě metody stejně silné – ke každému automatu jedné varianty existuje ekvivalentní automat druhé.", cv: "Přijímání prázdným zásobníkem: při b se odebírají symboly A vložené při a a nakonec se odstraní i startovní symbol – prázdný zásobník značí přijetí. Při přijímání koncovým stavem se naopak po posledním b přejde do přijímajícího stavu a na obsahu zásobníku nezáleží." },
    "Determinismus a nedeterminismus": { ex: "Palindrom wwᴿ vyžaduje rozpoznat střed slova. Deterministický automat při čtení neví, kdy střed nastal. Nedeterministický automat může střed „uhodnout“ – přijme, existuje-li alespoň jeden výpočet, který od správného středu začne porovnávat.", cv: "Deterministický zásobníkový automat má v každé situaci jediný možný krok – musel by jednoznačně poznat polovinu slova, což z lokálního pohledu nelze. Nedeterministický automat výpočet větví a v jedné větvi střed odhadne správně; jazyk palindromů proto rozpozná jen on. U konečných automatů nedeterminismus žádnou sílu nepřidává." },
    "Nedeterministická syntaktická analýza": { ex: "Parser podle gramatiky s pravidly výraz → výraz+člen a člen → člen*faktor sestaví strom, v němž je „+“ nahoře a „*“ níž. Podstrom násobení se vyhodnotí dřív, výsledek je 1+(2·3)=7 – což odpovídá prioritě operací.", cv: "Derivační strom: kořen je sčítání s potomky 1 a podstromem 2*3. Podstrom násobení je hlouběji, vyhodnotí se proto první (2·3=6) a teprve pak sčítání (1+6=7). Hloubka v derivačním stromu tak vynucuje vyšší prioritu násobení." },
    "Uzávěrové vlastnosti bezkontextových jazyků": { ex: "Bezkontextové jazyky jsou uzavřené na sjednocení (gramatiky lze sloučit), ne však na průnik. Příklad: jazyk se stejným počtem a a b a jazyk se stejným počtem b a c jsou bezkontextové, jejich průnik aⁿbⁿcⁿ ale bezkontextový není.", cv: "Vezměme L1 = {aⁿbⁿcᵐ} a L2 = {aᵐbⁿcⁿ}. Každý porovnává jen dva počty, oba jsou tedy bezkontextové. Jejich průnik je {aⁿbⁿcⁿ}, který vyžaduje porovnat tři počty – ten bezkontextový není (lze dokázat pumping lemmatem pro bezkontextové jazyky)." }
  },
  "Rozhodnutelnost": {
    "Pojem algoritmického problému a algoritmu": { ex: "„Je dané číslo prvočíslo?“ má vstup (číslo) a odpověď ANO/NE, jde tedy o rozhodovací problém. Algoritmus zkusmého dělení postupně zkouší dělitele do odmocniny – po konečném počtu kroků jednoznačně odpoví, splňuje tedy definici algoritmu.", cv: "Rozhodovací problém: vstupem je seznam, otázka „obsahuje dva stejné prvky?“, odpověď ANO/NE. Algoritmus: prvky vkládej postupně do množiny; narazíš-li na prvek, který už v ní je, vrať ANO, jinak po projití celého seznamu vrať NE. Skončí po konečném počtu kroků." },
    "Turingův stroj": { ex: "Stroj pro aⁿbⁿ střídavě škrtá jedno a a jedno b a vrací hlavu zpět. V konečném řízení si pamatuje jen fázi (hledám a / hledám b), nikoli kolik jich už zpracoval – počty „pamatuje“ samotná páska.", cv: "Stroj prochází vstup aⁿ a každé a zpracuje tak, že ho označí a na konec pásky dopíše dvě nová a. Postup opakuje pro každé původní a; po vyčerpání vstupu obsahuje páska a²ⁿ. Klíčové je systematicky střídat čtení vlevo a zápis vpravo." },
    "Problém zastavení": { ex: "Kdyby existoval univerzální „detektor zastavení“ H, šel by z něj sestrojit program D, který se zacyklí právě tehdy, když H tvrdí, že D skončí. Předpoklad existence H tedy vede ke sporu – H existovat nemůže.", cv: "Předpokládejme program H(p,v), jenž řekne, zda p na vstupu v skončí. Sestrojíme D(p): zavolá H(p,p); řekne-li H „skončí“, D se zacyklí, jinak skončí. Spustíme D(D): D skončí ⇒ H řekl „skončí“ ⇒ D se měl zacyklit, a naopak. Spor ⇒ H nemůže existovat." },
    "Rozhodnutelnost a částečná rozhodnutelnost": { ex: "Problém zastavení je částečně rozhodnutelný: program odsimulujeme – skončí-li, odpovíme ANO. Záporné případy ale poznat neumíme: pokud program běží dál, nikdy nevíme, zda se nezastaví později – simulace u nich neskončí.", cv: "Rozhodnutelný problém má algoritmus, který pro každý vstup vždy skončí správnou odpovědí. Částečně rozhodnutelný má algoritmus, jenž skončí s ANO na kladných vstupech, na záporných se může zacyklit. Věta o doplňku: problém je rozhodnutelný právě tehdy, když jsou částečně rozhodnutelné on i jeho doplněk." },
    "Nerozhodnutelnost": { ex: "Otázka ekvivalence dvou programů je nerozhodnutelná. Nejde o to, že by počítač byl pomalý – žádný algoritmus, ani s libovolným časem a pamětí, ji nevyřeší pro všechny vstupy. Je to principiální mez výpočtu.", cv: "Tři příklady: problém zastavení (zda program skončí), ekvivalence dvou programů (zda počítají tutéž funkci) a zda program někdy vypíše dané slovo. Nerozhodnutelnost nesouvisí s rychlostí: rychlejší počítač zkrátí čas, ale neexistujícího algoritmu se nedobere." },
    "Metoda redukce": { ex: "Z libovolného programu P a vstupu v sestrojíme program, který odsimuluje P a po jeho skončení vypíše „HELLO“. Ten vypíše HELLO právě tehdy, když P skončí – řešení otázky „vypíše program HELLO?“ by tedy vyřešilo i problém zastavení.", cv: "Z programu P a vstupu v sestrojíme program Q, jenž odsimuluje P na v a teprve po jeho skončení použije nějakou proměnnou. Q proměnnou použije právě tehdy, když P skončí. Kdyby šlo rozhodnout „použije Q proměnnou?“, vyřešili bychom i problém zastavení – ten je ale nerozhodnutelný, takže i nový problém je nerozhodnutelný." },
    "Diagonalizace": { ex: "Předpokládáme, že lze všechna reálná čísla z (0,1) vypsat do seznamu. Zkonstruujeme číslo lišící se od n-tého čísla seznamu na n-té číslici. To se liší od každého čísla v seznamu, takže v seznamu být nemůže – seznam tedy nebyl úplný.", cv: "Předpokládejme seznam všech nekonečných posloupností nul a jedniček s₁, s₂, s₃, … Sestrojíme posloupnost t, jejíž n-tý prvek je opakem n-tého prvku posloupnosti sₙ. Pak se t liší od každé sₙ aspoň na n-té pozici, takže v seznamu chybí – posloupností je nespočetně mnoho." }
  },
  "Složitost": {
    "Složitost algoritmu versus složitost problému": { ex: "Bublinkové řazení dělá až n² porovnání ⇒ O(n²); mergesort O(n log n). Složitost problému řazení porovnáváním je dolním odhadem Ω(n log n) – žádný algoritmus založený na porovnávání nemůže být asymptoticky rychlejší.", cv: "Naivní algoritmus násobení matic n×n počítá n² prvků, každý jako součet n součinů ⇒ O(n³). To je složitost konkrétního algoritmu (horní mez problému). Složitost problému je složitost nejlepšího možného algoritmu – ta je nižší a její přesná hodnota není známa." },
    "Složitostní třídy (P, NP, PSPACE)": { ex: "Nejkratší cesta se najde v polynomiálním čase ⇒ třída P. U Sudoku se navržené řešení snadno (polynomiálně) ověří, i když ho těžko hledáme ⇒ NP. Vyhodnocení kvantifikované formule potřebuje polynomiální prostor ⇒ PSPACE.", cv: "Třídění: existuje algoritmus O(n log n), běží v polynomiálním čase ⇒ P (a tím i NP). SAT: navržené ohodnocení proměnných se ověří dosazením v polynomiálním čase ⇒ NP. Hledání nejkratší cesty: Dijkstrův algoritmus běží polynomiálně ⇒ P." },
    "Vztahy mezi třídami a příklady problémů": { ex: "Každý problém řešitelný v polynomiálním čase lze v polynomiálním čase i ověřit, takže P ⊆ NP; každý ověřitelný v polynomiálním čase lze řešit v polynomiálním prostoru, takže NP ⊆ PSPACE. Zda jsou inkluze ostré, není známo.", cv: "Diagram: tři vnořené oblasti, P uvnitř NP a NP uvnitř PSPACE. Do P patří třídění a hledání nejkratší cesty, do NP problém SAT a barvení grafu, do PSPACE vyhodnocování kvantifikovaných booleovských formulí. Otázka P = NP je nejznámějším otevřeným problémem oboru." },
    "Těžkost a úplnost problému": { ex: "SAT je v NP (ohodnocení se ověří dosazením) a zároveň NP-těžký – každý problém z NP se na něj polynomiálně redukuje (Cookova–Levinova věta). Splňuje obě podmínky, je tedy NP-úplný: reprezentativní nejtěžší zástupce třídy NP.", cv: "NP-těžký problém je takový, na nějž lze polynomiálně redukovat každý problém z NP – sám v NP být nemusí. NP-úplný je problém, který je NP-těžký a navíc leží v NP. Příklad NP-úplného: SAT. Příklad NP-těžkého (zřejmě mimo NP): problém zastavení Turingova stroje." },
    "Polynomiální redukce problémů": { ex: "Nezávislá množina v grafu G odpovídá klice v doplňkovém grafu Ḡ. Převod G na Ḡ je polynomiální, takže řešení klikového problému dává i řešení problému nezávislé množiny – problémy jsou stejně těžké.", cv: "Redukce 3-SAT na klikový problém: pro formuli s k klauzulemi sestrojíme graf, kde vrcholy jsou literály klauzulí a hranou spojíme literály z různých klauzulí, které si neodporují. Formule je splnitelná právě tehdy, když má graf kliku velikosti k. Převod je polynomiální." },
    "NP-úplné úlohy": { ex: "SAT je NP-úplný (Cookova–Levinova věta); barvení grafu, problém obchodního cestujícího i problém batohu se na něj dají polynomiálně převést. Kdyby pro jediný z nich existoval polynomiální algoritmus, převedl by se na všechny ostatní – platilo by P = NP.", cv: "SAT: vstup je booleovská formule, otázka „existuje splňující ohodnocení?“, certifikátem je ohodnocení (ověří se dosazením). Barvení grafu: vstup graf a počet k, otázka „lze obarvit k barvami?“, certifikát je obarvení. Problém batohu: vstup předměty s váhami a hodnotami, certifikát je výběr předmětů." }
  },
  "Principy strojového učení": {
    "Učení s učitelem a bez učitele": { ex: "U spamu máme e-maily označené jako spam/ham – model se učí předpovídat značku ⇒ učení s učitelem. U zákazníků značky nemáme, hledá se skrytá struktura (skupiny podobného chování) ⇒ učení bez učitele.", cv: "Předpověď ceny bytu: trénovací byty mají známé ceny ⇒ učení s učitelem (regrese). Shlukování článků podle témat: články nemají předem dané značky ⇒ učení bez učitele. Hraní šachů: agent se učí z odměn za výsledek partie ⇒ učení posilované." },
    "Proces trénování modelů a vyhodnocování výsledků": { ex: "Přesnost 99 % na trénovacích datech a jen 60 % na testovacích znamená, že model si trénovací data zapamatoval, ale neumí zobecnit. Skutečnou kvalitu proto měříme na datech, která model při učení neviděl.", cv: "Data náhodně rozdělíme například v poměru 80 % trénovací a 20 % testovací (testovací se při učení nepoužijí). Model natrénujeme na trénovacích datech. Vysoká přesnost na trénovacích, ale výrazně nižší na testovacích datech značí přeučení; nízká na obou značí nedoučení." },
    "Učení rozhodovacích stromů": { ex: "Strom se buduje shora dolů: v každém uzlu zvolíme atribut, který data nejlépe rozdělí na čisté skupiny. Mírou je entropie – po rozdělení podle „prší?“ klesne nejvíc, proto je tento atribut v kořeni; informační zisk je právě tento pokles entropie.", cv: "Pro každý atribut spočítáme entropii dat před rozdělením a vážený průměr entropií skupin po rozdělení podle hodnot atributu. Informační zisk je rozdíl těchto hodnot. Do kořene zvolíme atribut s nejvyšším informačním ziskem – ten data rozdělí na nejčistší skupiny." },
    "Metoda k nejbližších sousedů": { ex: "k-NN si jen pamatuje trénovací data (líné učení). Nový bod zařadí podle většiny mezi svými k nejbližšími sousedy. Při k=3 a sousedech tříd A, A, B převažuje A dvěma hlasy proti jednomu, bod je tedy třídy A.", cv: "Spočítáme vzdálenosti nového bodu ke všem trénovacím bodům. Pro k=1 rozhoduje jediný nejbližší soused. Pro k=3 vezmeme tři nejbližší a hlasujeme většinou. Malé k je citlivé na šum (rozhodne jediný odlehlý bod), velké k rozhodnutí vyhladí, ale stírá detailní hranice tříd." },
    "(Naivní) Bayesovský klasifikátor": { ex: "Filtr spočítá P(spam | slova) pomocí Bayesovy věty. „Naivní“ předpoklad říká, že slova jsou ve třídě nezávislá, takže P(slova|spam) je součin pravděpodobností jednotlivých slov – výpočet se tím radikálně zjednoduší a přesto funguje dobře.", cv: "Z trénovacích e-mailů spočítáme P(spam), P(ham) a pro každé slovo P(slovo|spam) a P(slovo|ham). Pro nový e-mail vynásobíme pravděpodobnosti jeho slov (naivní předpoklad nezávislosti) s apriorní pravděpodobností třídy a zařadíme ho do třídy s vyšším výsledkem." },
    "Logistická regrese": { ex: "Model spočítá lineární kombinaci vstupů (například velikosti nádoru) a protáhne ji sigmoidní funkcí, která libovolné číslo zobrazí do intervalu (0,1). Výstup se tak interpretuje jako pravděpodobnost příslušnosti ke třídě.", cv: "Přes název „regrese“ je výstupem pravděpodobnost (číslo mezi 0 a 1), podle níž se vstup zařadí do třídy (například s prahem 0,5) – jde tedy o klasifikaci. Sigmoidní funkce má roli „mačkadla“: libovolně velkou lineární kombinaci vstupů převede na pravděpodobnost v intervalu (0,1)." },
    "Detekce anomálií": { ex: "Banka z historie sestaví model běžných transakcí zákazníka. Platba, která je vzhledem k tomuto modelu málo pravděpodobná (cizí země, neobvyklá částka), dostane nízké skóre a systém ji označí k prověření jako možný podvod.", cv: "Z historických měření spočítáme „normální“ rozsah – například průměr a směrodatnou odchylku teploty. Měření odchýlené od průměru o více než zvolený násobek směrodatné odchylky (např. trojnásobek) označíme za anomálii. Sledovat lze i náhlé skoky proti předchozím hodnotám." }
  },
  "Metody strojového učení": {
    "Lineární regrese a metoda nejmenších čtverců": { ex: "Body se proloží přímkou y = a·x + b. Metoda nejmenších čtverců volí a a b tak, aby součet kvadrátů svislých odchylek bodů od přímky byl co nejmenší – kvadráty trestají velké odchylky a dávají jednoznačné, hladké řešení.", cv: "Body (1,2),(2,2),(3,4),(4,5) leží přibližně na rostoucí přímce; proložená přímka má kladný sklon zhruba 1 a prochází středem mraku bodů (přibližně y ≈ x + 0,5). Metoda nejmenších čtverců minimalizuje součet kvadrátů svislých vzdáleností bodů od přímky." },
    "Hierarchické shlukování": { ex: "Aglomerativní shlukování začne s každým bodem jako vlastním shlukem a opakovaně sloučí dva nejbližší. Vzniká strom slučování – dendrogram; jeho „rozříznutím“ ve zvolené výšce získáme libovolný počet shluků.", cv: "Mějme body 1, 2, 5, 6, 10. Sloučíme nejbližší dvojici {1,2}, pak {5,6}, pak ke {5,6} přidáme 10, nakonec spojíme oba velké shluky. Dendrogram má tato slučování v rostoucí výšce podle vzdálenosti; řez v nízké výšce dá tři shluky {1,2}, {5,6}, {10}." },
    "Algoritmus k-means": { ex: "k-means pro k=2 zvolí dva počáteční středy a střídá dva kroky: každý bod přiřadí k bližšímu středu a poté každý střed přepočítá jako průměr přiřazených bodů. Opakuje, dokud se přiřazení mění; konverguje k lokálnímu optimu.", cv: "Zvolíme dva počáteční středy. Iterace 1: každý ze 6 bodů přiřadíme k bližšímu středu a oba středy přepočítáme jako průměr souřadnic přiřazených bodů. Iterace 2: s novými středy znovu přiřadíme body a znovu přepočítáme středy. Algoritmus končí, když se přiřazení už nemění." },
    "Model umělého neuronu": { ex: "Neuron sečte vážené vstupy a porovná je s prahem. Pro AND s váhami (1,1) a prahem 1,5 je součet 2 jen u vstupu (1,1) – jen tehdy překročí práh a výstup je 1; u ostatních vstupů je součet nejvýše 1.", cv: "Pro OR stačí výstup 1, je-li aspoň jeden vstup 1. Zvolíme váhy (1,1) a práh 0,5: vstup (0,0) dá součet 0 (pod prahem, výstup 0), vstupy (1,0), (0,1) i (1,1) dají součet 1 nebo 2 (nad prahem, výstup 1). Funkce OR je realizována jediným neuronem." },
    "Vícevrstvé sítě a jejich vyjadřovací schopnosti": { ex: "Jeden neuron odděluje vstupy přímkou (lineárně). XOR má kladné případy (0,1) a (1,0) a záporné (0,0) a (1,1) – ty nelze oddělit jednou přímkou. Dvouvrstvá síť přidá skrytou vrstvu a nelineární aktivaci, čímž zvládne i takto propletené třídy.", cv: "XOR je 1 pro vstupy (0,1) a (1,0) a 0 pro (0,0) a (1,1). V rovině nelze tyto skupiny oddělit jedinou přímkou, jeden neuron tedy XOR neumí. Síť se skrytou vrstvou: dva skryté neurony spočítají „aspoň jeden“ a „oba“, výstupní neuron z nich složí „aspoň jeden a ne oba“." },
    "Učení modelů pomocí gradientního sestupu": { ex: "Gradientní sestup hledá minimum chybové funkce. V každém kroku spočítá gradient (směr nejrychlejšího růstu) a posune parametry opačným směrem o krok daný rychlostí učení – jako kulička kutálející se z kopce do údolí.", cv: "f(w)=(w−3)², f′(w)=2(w−3), krok 0,1, start w=0. Krok 1: w = 0 − 0,1·2·(0−3) = 0,6. Krok 2: w = 0,6 − 0,1·2·(0,6−3) = 1,08. Krok 3: w = 1,08 − 0,1·2·(1,08−3) = 1,464. Hodnoty se blíží k minimu w=3." }
  },
  "Umělá inteligence": {
    "Vymezení umělé inteligence": { ex: "Šachový program i hlasový asistent řeší jednu konkrétní úlohu, jde tedy o „slabou“ AI. „Silná“ AI by měla obecnou inteligenci srovnatelnou s člověkem napříč úlohami – ta zatím zůstává hypotetická.", cv: "Za AI označíme systémy řešící úlohy, které u člověka vyžadují inteligenci: spamový filtr (učí se klasifikovat), navigaci s plánováním trasy (prohledávání), strojový překlad. Kalkulačka či obyčejný třídicí algoritmus jen vykonávají pevný postup bez učení a usuzování – ty za AI nepovažujeme." },
    "Turingův test": { ex: "Stroj uspěje, pokud člověk v psané konverzaci nepozná, že nemluví s člověkem. Test záměrně posuzuje jen pozorovatelné chování – nezkoumá, zda stroj „rozumí“, jen zda se chová nerozlišitelně od člověka.", cv: "Námitka čínského pokoje (Searle): člověk v místnosti mechanicky podle pravidel přehazuje čínské znaky a navenek odpovídá smysluplně čínsky, aniž by čínsky rozuměl. Stejně tak by stroj mohl test projít pouhou manipulací se symboly – úspěch v testu tedy nedokazuje skutečné porozumění." },
    "Prohledávání stavového prostoru – neinformované": { ex: "Hlavolam s dlaždicemi popíšeme jako stavový prostor: stav je rozložení dlaždic, operátory jsou posuny. BFS prohledává stavy po vrstvách podle počtu tahů od startu, takže najde řešení s nejmenším počtem tahů; prozkoumá ale velké množství stavů.", cv: "Stav = pozice v bludišti, počáteční stav = vchod, cílový stav = východ, operátory = kroky na sousední volné políčko. BFS: vchod vložíme do fronty, opakovaně vybereme políčko a do fronty přidáme jeho nenavštívené sousedy. Protože postupuje po vrstvách vzdálenosti, najde nejkratší cestu k východu." },
    "Prohledávání stavového prostoru – heuristické": { ex: "A* vybírá k rozvinutí stav s nejmenší hodnotou f = g + h, kde g je dosavadní cena cesty a h heuristický odhad zbývající vzdálenosti. Heuristika hledání nasměruje k cíli, takže prozkoumá mnohem méně stavů než neinformované prohledávání.", cv: "V mřížce s pohyby nahoru/dolů/vlevo/vpravo je přípustná heuristika manhattanská vzdálenost |Δx|+|Δy| k cíli. Je přípustná, protože nikdy nenadhodnotí skutečnou vzdálenost (skutečná cesta je vždy aspoň takto dlouhá). Pro přípustnou heuristiku najde A* zaručeně optimální řešení." },
    "Problémy s omezujícími podmínkami": { ex: "Sudoku je CSP: proměnné jsou políčka, obory hodnot {1 až 9}, podmínky zakazují opakování v řádku, sloupci a bloku. Řeší se backtrackingem – postupně dosazujeme hodnoty a při porušení podmínky se vracíme; propagace podmínek prohledávání zrychluje.", cv: "Proměnné: tři státy A, B, C. Obor hodnot každé: {červená, zelená, modrá}. Podmínky: sousední státy mají různou barvu, tedy A≠B, B≠C, A≠C. Řešením je libovolné přiřazení splňující všechny tři nerovnosti, například A=červená, B=zelená, C=modrá." },
    "Hry a herní strategie (minimax, alfa-beta, ohodnocovací funkce)": { ex: "Minimax prochází strom tahů: hráč na tahu (MAX) volí maximum z hodnot potomků, soupeř (MIN) minimum. Alfa-beta ořezávání udržuje meze alfa a beta a přeskočí větev, jakmile je jasné, že volbu výše ve stromu nemůže ovlivnit.", cv: "Hodnoty listů se zdola nahoru kombinují: v MIN-uzlu se vezme minimum potomků, v MAX-uzlu maximum – hodnota kořene je výsledek minimaxu. Alfa-beta: jakmile MIN-uzel najde potomka horšího pro MAX, než je dosavadní nejlepší volba MAX-rodiče, zbývající potomky tohoto MIN-uzlu lze přeskočit." }
  },
  "Matematická logika": {
    "Výroková logika": { ex: "Implikace X→Y je nepravdivá jen tehdy, když X je pravda a Y nepravda. U (A∧B)→A je antecedent pravdivý pouze pro A=1,B=1; tehdy je i závěr A pravdivý. Ve všech ostatních řádcích je antecedent nepravdivý, takže implikace platí. Formule je tautologie.", cv: "A→B je ekvivalentní ¬A∨B a B→A je ¬B∨A. Konjunkce je pravdivá právě tehdy, když platí obě implikace, tedy když A a B mají stejnou pravdivostní hodnotu. Pro (A,B)=(0,0) a (1,1) je formule pravdivá, pro (1,0) a (0,1) nepravdivá. Jde o ekvivalenci A↔B." },
    "Predikátová logika": { ex: "Výroková logika neumí mluvit o jednotlivých číslech a jejich vlastnostech. V predikátové logice lze tvrzení zapsat například ∀n ((Sudé(n) ∧ n&gt;2) → ∃p∃q (Prvočíslo(p) ∧ Prvočíslo(q) ∧ n=p+q)). Zápis odděluje kvantifikaci přes objekty od predikátů vyjadřujících vlastnosti.", cv: "Při doménách studenti a předměty lze použít predikát Zná(s,p). Věta zní ∃s (Student(s) ∧ ∀p (Předmět(p) → Zná(s,p))). Pokud je doména první proměnné už omezena jen na studenty a druhé jen na předměty, stačí ∃s∀p Zná(s,p)." },
    "Splnitelnost": { ex: "Formule požaduje zároveň, aby alespoň jeden z A,B platil, a aby neplatily oba současně. Ohodnocení A=1,B=0 splní první klauzuli i druhou, stejně A=0,B=1. Jde tedy o splnitelnou formuli, konkrétně exkluzivní disjunkci. A∧¬A splnit nelze, protože stejný výrok nemůže být současně pravdivý i nepravdivý.", cv: "Z ¬A plyne A=0 a z ¬B plyne B=0. Pak je ale první část A∨B rovna 0∨0, tedy nepravda. Formule (A∨B)∧¬A∧¬B je proto nesplnitelná; žádné vyhovující ohodnocení neexistuje." },
    "Pravdivost": { ex: "A∨¬A je pravdivá pro A=1 i A=0, proto je tautologií. Její negace ¬(A∨¬A) je ekvivalentní ¬A∧A, což je kontradikce. Obecně formule platí ve všech ohodnoceních právě tehdy, když její negace není splnitelná.", cv: "Negace formule je ¬((A→B)∨(B→A)), tedy ¬(A→B)∧¬(B→A). První člen vyžaduje A=1,B=0, druhý B=1,A=0. To nelze splnit současně, takže negace je nesplnitelná. Původní formule je tedy tautologie." },
    "Dokazatelnost": { ex: "Dokazatelnost je syntaktická vlastnost: existuje konečný formální důkaz z axiomů a odvozovacích pravidel. Formule A→A je dokazatelná v běžných korektních kalkulech a zároveň pravdivá v každém ohodnocení. Úplnost říká, že každá sémanticky platná formule je dokazatelná; korektnost říká, že dokazatelné formule jsou platné.", cv: "Pravdivost je sémantika: formule platí ve všech modelech či ohodnoceních. Dokazatelnost je syntaxe: formuli lze odvodit pravidly kalkulu. Věta o korektnosti: pokud je formule dokazatelná, je pravdivá. Věta o úplnosti: pokud je formule pravdivá, je dokazatelná. Dohromady propojují formální důkazy s významem formulí." },
    "Důkazové metody": { ex: "Důkaz sporem předpokládá opak tvrzení a dojde ke kontradikci; u √2 se předpokládá zlomek v základním tvaru a vyjde, že čitatel i jmenovatel jsou sudé. Indukce má bázi a indukční krok; pro součet 1+...+n se ověří n=1 a z platnosti pro n odvodí platnost pro n+1.", cv: "Báze: pro n=1 je součet prvního lichého čísla 1=1². Indukční předpoklad: 1+3+...+(2n−1)=n². Indukční krok: přidáme další liché číslo 2(n+1)−1=2n+1, takže součet je n²+2n+1=(n+1)². Tvrzení tedy platí pro všechna n≥1." },
    "Rezoluční metoda": { ex: "Rezoluce pracuje s klauzulemi. Z klauzulí {A,B} a {¬A} lze odstranit komplementární literály A a ¬A a odvodit rezolventu {B}. Pokud po přidání negace dokazovaného tvrzení odvodíme prázdnou klauzuli, původní množina je nesplnitelná a tvrzení z předpokladů logicky plyne.", cv: "Převeďme A→B na ¬A∨B a B→C na ¬B∨C. Negace závěru A→C je A∧¬C. Klauzule: {¬A,B}, {¬B,C}, {A}, {¬C}. Rezolucí {¬A,B} s {A} dostaneme {B}; {¬B,C} s {B} dá {C}; {C} s {¬C} dá prázdnou klauzuli. Tedy z předpokladů plyne A→C." },
    "Reprezentace a vyvozování znalostí": { ex: "Fakta lze zapsat Člověk(Sokrates) a pravidlo ∀x (Člověk(x) → Smrtelný(x)). Dopředné odvozování pravidlo aplikuje na známý fakt a přidá Smrtelný(Sokrates). Znalostní báze tedy odděluje explicitně uložená fakta od pravidel, která generují další důsledky.", cv: "Fakta: Rodič(Ana,Beata), Rodič(Beata,Cyril). Pravidlo: ∀x∀y∀z ((Rodič(x,y) ∧ Rodič(y,z)) → Prarodič(x,z)). Dosazením x=Ana, y=Beata, z=Cyril jsou oba předpoklady pravdivé, proto inferenční pravidlo odvodí Prarodič(Ana,Cyril)." }
  },
  "Strukturování a řízení běhu programu": {
    "Podprogramy": { ex: "Funkce obsah(a,b) odstraní duplicitu: výpočet a*b je na jednom místě a volající předává jen různé argumenty. Výhoda je údržba i čitelnost: změna pravidla výpočtu se provede jednou a všechny volání ji používají automaticky.", cv: "Rozdělení může být prumer(pole), který sečte prvky a vydělí počtem, a smerodatnaOdchylka(pole), která nejprve zavolá prumer(pole), pak spočítá průměr čtverců odchylek a odmocninu. Volání: m=prumer(data); s=smerodatnaOdchylka(data). Každá funkce má jednu odpovědnost." },
    "Rozsahy jmen": { ex: "Rozsah jména určuje, kde je identifikátor viditelný. Lokální proměnná i uvnitř funkce nebo bloku překryje případné vnější jméno jen v tomto rozsahu a po opuštění bloku zaniká. Proto stejně pojmenované proměnné v různých funkcích nekolidují.", cv: "Například globální x=10 a uvnitř funkce lokální x=3. Příkaz print(x) uvnitř funkce vypíše 3, protože lokální jméno překrývá globální. Příkaz print(x) mimo funkci vypíše 10. Po skončení funkce lokální x neexistuje a globální hodnota zůstává nezměněná." },
    "Předávání hodnot": { ex: "Při předání hodnotou funkce pracuje s kopií, takže změna parametru typu číslo neovlivní proměnnou volajícího. Při předání odkazem či ukazatelem funkce dostane přístup k původnímu objektu; změna prvku pole se projeví venku. Rozdíl je zásadní pro mutaci dat a efektivitu.", cv: "Swap hodnotou dostane kopie a po návratu jsou původní proměnné stejné. Při předání odkazem nebo ukazatelem lze provést tmp=*a; *a=*b; *b=tmp, takže se mění paměť volajícího. Proto v C typicky píšeme swap(int *a, int *b) a voláme swap(&x,&y)." },
    "Výjimky": { ex: "Výjimka oddělí běžný tok programu od ošetření chyby. Rizikový kód je v try, konkrétní catch zachytí očekávaný typ chyby a provede náhradní postup nebo hlášení. Program tak nemusí po dělení nulou či chybě souboru spadnout bez kontroly.", cv: "Nejdřív mají být konkrétní výjimky, potom obecnější. Pseudokód: try { n=parseInt(text); vysledek=a/n; } catch (FormatException e) { ohlas neplatné číslo; } catch (ArithmeticException e) { ohlas dělení nulou; } catch (Exception e) { obecná chyba; }. Obecný catch na začátku by pohltil všechny specializované případy." },
    "Objektově orientované programování": { ex: "Třída je předpis společných atributů a metod, objekt je konkrétní instance. BankovníÚčet definuje zůstatek a operace vložit/vybrat; účet Alice a účet Boba jsou dva objekty s odlišným stavem. Metody pracují nad stavem příslušné instance.", cv: "Třída Auto může mít atributy znacka, spz, rychlost a metody zrychli(delta), zabrzdi(delta), popis(). Instance a1=Auto('Skoda','1A2',0) a a2=Auto('Toyota','2B3',50) sdílejí stejný kód metod, ale mají vlastní hodnoty atributů." },
    "Zapouzdření": { ex: "Zapouzdření skrývá reprezentaci objektu a vynucuje invarianty přes veřejné metody. Pokud je zůstatek private, cizí kód nemůže nastavit zápornou částku přímo; musí použít vybrat(), která kontroluje limit. Objekt tak chrání svou konzistenci.", cv: "Veřejný atribut vek nahraď soukromým _vek. Getter getVek() hodnotu vrací, setter setVek(v) nejprve ověří v>=0 a rozumnou horní mez, jinak odmítne změnu. Klient používá metody, takže třída může hlídat platnost dat a později změnit interní reprezentaci bez změny rozhraní." },
    "Dědičnost": { ex: "Dědičnost modeluje vztah „je druhem“. Student je Osoba, proto přebírá jméno a věk a specializuje se atributem obor nebo metodou zapišPředmět. Společné chování se neduplikuje v potomcích, ale zůstává v předkovi.", cv: "Předek Zaměstnanec: jmeno, mzda, metoda vypocetVyplaty(). Manažer dědí společné atributy a přidá tym nebo bonusZaTym. Programátor dědí totéž a přidá jazyk nebo senioritu. Společné vlastnosti jsou v předkovi, specializované jen v konkrétních potomcích." },
    "Polymorfismus": { ex: "Polymorfismus dovoluje zacházet s různými objekty přes společné rozhraní. Pole Tvar může obsahovat Kruh i Čtverec; volání vykresli() se dynamicky naváže na skutečný typ objektu. Klient tedy nemusí psát podmínky podle typu každého tvaru.", cv: "Rozhraní Tvar definuje obvod(). Třída Kruh vrací 2πr, třída Obdelnik vrací 2*(a+b). Seznam [Kruh(1), Obdelnik(2,3)] lze projít cyklem a pro každý prvek zavolat t.obvod(). Volající zná jen rozhraní Tvar, konkrétní výpočet řeší implementace dané třídy." }
  },
  "Principy nízkoúrovňového programování": {
    "Paměťový model programu": { ex: "Zásobník slouží pro aktivační záznamy funkcí a lokální automatické proměnné; po návratu z funkce je paměť neplatná. Halda obsahuje dynamicky alokované bloky řízené malloc/free a přežije návrat z funkce. Statická data obsahují globální a static proměnné s životností celého programu.", cv: "V C programu bude globální int g ve statických datech, lokální int x uvnitř funkce na zásobníku, blok vrácený malloc na haldě a pointer p jako lokální proměnná typicky na zásobníku. Samotný p je adresa, ale paměť, na kterou ukazuje, je na haldě." },
    "Správa paměti a dynamická alokace": { ex: "malloc vrací blok, který program musí přesně jednou uvolnit pomocí free. Chybějící free způsobí únik paměti, opakovaný free nebo použití pointeru po free vede k nedefinovanému chování. Po free je vhodné pointer nepoužívat, případně ho nastavit na NULL.", cv: "Kód: int *a = malloc(n * sizeof *a); if (!a) řeš chybu; for (i=0;i<n;i++) a[i]=i; ...; free(a); a=NULL;. Únik by vznikl při návratu z funkce po malloc před free, například v chybové větvi. Každá větev po úspěšné alokaci musí dojít k uvolnění." },
    "Práce s uživatelskými datovými strukturami": { ex: "Uzel seznamu může mít tvar struct Node { int value; struct Node *next; }. Vložení na začátek alokuje nový uzel, nastaví jeho next na původní hlavu a hlavu přesune na nový uzel. Pro uvolnění je nutné projít celý seznam a free zavolat na každý uzel.", cv: "insert_front(&head,x): alokuj uzel, nastav value=x, next=head, potom head=novy. print(head): dokud p!=NULL, vypiš p->value a přejdi p=p->next. free_list(head): ulož next=p->next, free(p), p=next. Bez posledního průchodu by každý alokovaný uzel zůstal na haldě jako únik." },
    "Nízkoúrovňová práce s pamětí": { ex: "C nekontroluje meze pole za běhu. Zápis a[10] u pole int a[10] míří za poslední platný prvek a může přepsat jinou lokální proměnnou, návratovou adresu nebo metadata haldy. Následek může být pád, tichá chyba dat i zneužitelná zranitelnost.", cv: "Typická chyba je cyklus for (i=0; i<=10; i++) a[i]=0 u pole o 10 prvcích. Oprava je i<10, případně používat velikost předanou jako parametr a důsledně ji kontrolovat. Nebezpečí spočívá v přepisu cizí paměti, který jazyk neodmítne." },
    "Ukazatel": { ex: "Ukazatel uchovává adresu objektu. Operátor & adresu získá, operátor * dereferencuje ukazatel a zpřístupní hodnotu na dané adrese. Proto *p=8 po p=&x mění přímo x, ne kopii. Dereferencovat se smí jen platný ukazatel.", cv: "Funkce: void inc(int *p) { if (p) (*p)++; }. Volání: int x=5; inc(&x); po návratu je x=6. &x předá adresu proměnné a funkce přes *p upraví původní paměťové místo." },
    "Pole a ukazatelová aritmetika": { ex: "Ve výrazech se jméno pole často převede na ukazatel na první prvek. Výraz a+i ukazuje na i-tý prvek, protože aritmetika ukazatelů škáluje posun velikostí prvku. Proto a[i] je definováno jako *(a+i).", cv: "Pro int a[5] a int *p=a lze psát for (p=a; p<a+5; ++p) printf(\"%d\", *p);. Nepoužívají se indexy, jen porovnání adres v rámci stejného pole a dereference aktuálního ukazatele. Konec je a+5, tedy adresa těsně za posledním prvkem, kterou už nedereferencujeme." },
    "Způsoby ladění programu (debugging)": { ex: "Debugger umožní zastavit program na breakpointu, krokovat instrukce/řádky a sledovat hodnoty proměnných. Když výsledek začne být špatný po konkrétní iteraci, zúží se příčina na několik řádků. Valgrind nebo sanitizery doplní kontrolu paměťových chyb, které běžný debugger nemusí hned ukázat.", cv: "Nejprve bych vytvořil minimální vstup, kde chyba nastane. Breakpoint dám před cyklus, sleduji proměnné řídící index, mez a akumulátor. Krokováním porovnávám očekávaný a skutečný stav po každé iteraci. Jakmile se poprvé liší, ověřím podmínku cyklu, aktualizaci indexu a zápis do datové struktury." }
  },
  "Architektury": {
    "Číselné soustavy a vztahy mezi nimi": { ex: "13 děleno dvěma dává zbytky 1,0,1,1 čtené odzadu, tedy 1101₂. Šestnáctkově je 13 jedna cifra D. Zpětně 1101₂ = 1·8+1·4+0·2+1 = 13 a D₁₆ = 13.", cv: "45 dělením dvěma: zbytky 1,0,1,1,0,1 čtené odzadu dávají 101101₂. Do hexu seskupíme 0010 1101, tedy 2D₁₆. Kontrola: 2·16+13=45 a 101101₂ = 32+8+4+1=45." },
    "Zobrazení celého čísla v počítači a aritmetika": { ex: "V doplňkovém kódu dostaneme −5 tak, že 00000101 invertujeme na 11111010 a přičteme 1: 11111011. Součet s +5 je 11111011 + 00000101 = 1 00000000; přenos mimo 8 bitů se zahodí a výsledek je nula.", cv: "+12 je 00001100, inverze 11110011, plus 1 dává 11110100, tedy −12 v 8 bitech. Přetečení při sčítání kladných nastane, když výsledek přesáhne 127, například 01111111 + 00000001 = 10000000, což má znaménkový bit 1 a interpretuje se jako −128." },
    "Kódy (vnitřní, vnější, detekční a opravné)": { ex: "Paritní bit doplní počet jedniček na sudý nebo lichý. Jedna změna bitu paritu převrátí a chyba se odhalí. Dvě změny ji ale mohou zachovat. Hammingův kód používá více kontrolních bitů, jejichž syndrom ukáže pozici jedné chybné cifry.", cv: "Slovo 1011 má tři jedničky. Pro sudou paritu doplníme paritní bit 1, aby celkový počet jedniček byl 4; vznikne například 10111 podle zvolené pozice parity. Parita neodhalí sudý počet chyb, například překlopení dvou datových bitů, protože celková parita zůstane sudá." },
    "Obvody a paměti (parametry, architektura)": { ex: "Kombinační obvod nemá paměť; výstup sčítačky je funkcí aktuálních vstupů. Sekvenční obvod obsahuje stav, typicky klopné obvody, takže výstup závisí i na minulosti. Registr je sada klopných obvodů uchovávající více bitů.", cv: "Poloviční sčítačka má vstupy A,B. Tabulka: 00→S=0,C=0; 01→S=1,C=0; 10→S=1,C=0; 11→S=0,C=1. Součet S je XOR(A,B), přenos C je AND(A,B). Obvod tedy tvoří jedna brána XOR a jedna brána AND." },
    "Procesor, programování, mikroprogramování": { ex: "V cyklu fetch-decode-execute procesor podle PC načte instrukci do instrukčního registru, zvýší PC nebo připraví skok, dekodér určí operaci a operandy a výkonná část provede ALU operaci, přístup do paměti nebo změnu řízení. Mikroprogramovaný řadič rozkládá složité instrukce na mikrooperace.", cv: "Fetch: PC se pošle do paměti, načtená instrukce jde do IR, PC se posune na další instrukci. Decode: řadič rozpozná opcode a adresovací režim, připraví registry a řídicí signály. Execute: ALU počítá, paměť čte/zapisuje nebo se mění PC při skoku; výsledek se uloží do registru nebo paměti." },
    "Architektury RISC/CISC a vyrovnávací paměti": { ex: "RISC preferuje jednoduché instrukce pevné délky, mnoho registrů a load/store přístup k paměti. CISC nabízí složitější instrukce a adresovací režimy, často proměnné délky. Cache využívá časovou a prostorovou lokalitu: nedávno či sousedně použitá data se pravděpodobně použijí znovu.", cv: "RISC: jednodušší dekódování, snadnější pipeline, více práce pro překladač. CISC: hustší instrukční kód, složitější dekódování, instrukce mohou dělat více práce. Cache funguje, protože programy opakovaně sahají na stejná data a instrukce a na data blízko sebe; proto malá rychlá paměť významně snižuje průměrnou latenci." }
  },
  "Databáze": {
    "Relační model dat": { ex: "Relace je množina n-tic stejného schématu. STUDENT(id,jméno,ročník) má atributy se svými doménami a každý řádek je jedna n-tice. Pořadí řádků ani sloupců není podstatou relace; důležité jsou hodnoty atributů a integritní omezení.", cv: "KNIHA(isbn: text, nazev: text, autor: text, rok: celé číslo, stav: {volná,půjčená}) je relace, protože všechny řádky mají stejné atributy a hodnoty pocházejí z určených domén. Každý řádek reprezentuje jednu knihu nebo jeden exemplář podle zvoleného modelu." },
    "Relační schéma": { ex: "Schéma popisuje strukturu a typy: KNIHA(ISBN:text, název:text, rok:int). Instance relace je aktuální obsah tabulky, který se mění vložením či smazáním řádků. Schéma je stabilnější kontrakt, podle něhož databáze kontroluje data.", cv: "ZAMĚSTNANEC(id:int, jmeno:text, prijmeni:text, email:text, datum_nastupu:date, plat:decimal, id_odd:int). id může být primární klíč, email unikátní, id_odd cizí klíč na oddělení. Datové typy určují domény povolených hodnot." },
    "Klíče relačních schémat": { ex: "Kandidátní klíč minimálně jednoznačně identifikuje řádek. Primární klíč je vybraný kandidátní klíč používaný jako hlavní identifikátor. Cizí klíč je atribut nebo sada atributů odkazující na klíč jiné relace a vynucuje referenční integritu.", cv: "ZÁKAZNÍK(id_zak, jmeno, email) má primární klíč id_zak. OBJEDNÁVKA(id_obj, datum, id_zak, castka) má primární klíč id_obj. Atribut OBJEDNÁVKA.id_zak je cizí klíč na ZÁKAZNÍK(id_zak), takže každá objednávka patří existujícímu zákazníkovi." },
    "Relační algebra (projekce, selekce, agregace, přejmenování)": { ex: "Selekce filtruje řádky podle podmínky, projekce vybírá atributy, přejmenování mění názvy atributů nebo relací a agregace shrnuje skupiny. Výraz σ(ročník=1)(STUDENT) zachová celé řádky prváků, π(jméno)(...) z nich vybere jen jména.", cv: "Dotaz „jména studentů 3. ročníku“ zapíšeme π_jméno(σ_ročník=3(STUDENT)). Nejprve selekce omezí relaci na studenty třetího ročníku, potom projekce ponechá pouze atribut jméno." },
    "Spojování relací": { ex: "Join kombinuje související řádky z více relací. Přirozené spojení STUDENT ⋈ OBOR přes id_oboru spojí jen dvojice se stejnou hodnotou id_oboru a výsledkem je tabulka obsahující údaje studenta i název oboru.", cv: "Výraz může být ZAMĚSTNANEC ⋈_{ZAMĚSTNANEC.id_odd = ODDĚLENÍ.id_odd} ODDĚLENÍ a následně projekce π_{id,jméno,název}(...). Pokud mají oba atributy stejný název id_odd, lze použít i přirozené spojení po tomto atributu." },
    "Funkční závislosti": { ex: "ISBN→název,autor říká, že dvě n-tice se stejným ISBN musí mít stejný název a autora. Název→ISBN obecně neplatí, protože různé knihy mohou mít stejný název. Funkční závislosti popisují sémantiku dat a určují klíče i normalizaci.", cv: "Pro OBJEDNÁVKA(č_obj, datum, č_zák, jméno_zák) typicky platí č_obj→datum,č_zák a č_zák→jméno_zák. Z tranzitivity plyne č_obj→jméno_zák. Klíčem je č_obj, protože určí všechny ostatní atributy; závislost č_zák→jméno_zák ale způsobuje redundanci údajů o zákazníkovi." },
    "Normální formy (1NF, 2NF, 3NF, BCNF)": { ex: "1NF vyžaduje atomické hodnoty bez opakujících se seznamů v buňce. Sloupec telefony obsahující více čísel porušuje 1NF; správně vznikne samostatná relace TELEFON(osoba_id,telefon) nebo více řádků, kde každá hodnota je atomická.", cv: "U STUDENT(č_stud,předmět,jméno_uč,kabinet_uč) je přirozený klíč (č_stud,předmět), ale předmět určuje jméno_uč a jméno_uč určuje kabinet_uč. Nejde o 3NF kvůli tranzitivním a částečným závislostem neklíčových atributů. Rozklad na ZÁPIS(č_stud,předmět), VÝUKA(předmět,jméno_uč) a UČITEL(jméno_uč,kabinet_uč) redundanci odstraní." },
    "Vztahy mezi normálními formami": { ex: "Normální formy jsou hierarchické: BCNF ⇒ 3NF ⇒ 2NF ⇒ 1NF. Silnější forma splňuje všechny slabší požadavky. Přechod výš obvykle snižuje redundanci a aktualizační anomálie, ale může zvýšit počet spojení v dotazech.", cv: "Pořadí od nejslabší: 1NF požaduje atomické hodnoty; 2NF navíc odstraňuje závislost neklíčových atributů na části složeného klíče; 3NF odstraňuje tranzitivní závislosti neklíčových atributů; BCNF požaduje, aby levá strana každé netriviální funkční závislosti byla nadklíčem." },
    "Dekompozice relačních schémat a normalizace": { ex: "Rozklad STUDENT(č_stud,předmět,jméno_uč) na ZÁPIS(č_stud,předmět) a VÝUKA(předmět,jméno_uč) odstraní opakování jména učitele u každého studenta stejného předmětu. Spojením podle předmětu lze původní informaci obnovit, pokud předmět jednoznačně určuje učitele.", cv: "Například R(č_obj,datum,č_zák,jméno_zák) s č_obj→datum,č_zák a č_zák→jméno_zák rozložíme na OBJ(č_obj,datum,č_zák) a ZAK(č_zák,jméno_zák). Průnik je č_zák, který je klíčem ZAK, takže spojení je bezeztrátové. Závislosti č_obj→datum,č_zák a č_zák→jméno_zák jsou zachovány v jednotlivých relacích." }
  },
  "SQL, transakce a zpracování dotazů": {
    "Syntaxe a sémantika příkazů": { ex: "SQL dotaz má syntaktickou stránku, tedy povolený tvar příkazu, a sémantiku, tedy jaký výsledek nad databází označuje. SELECT jméno FROM Student WHERE ročník=1 vybírá atribut jméno z řádků splňujících podmínku. SŘBD rozhoduje, jaký fyzický plán pro tento deklarativní požadavek použije.", cv: "SELECT jmeno, email FROM Student WHERE rocnik = 2 ORDER BY prijmeni; Pokud se atributy jmenují s diakritikou, odpovídající varianta je SELECT jméno, email FROM Student WHERE ročník = 2 ORDER BY příjmení. WHERE filtruje druhý ročník a ORDER BY určuje řazení výsledku." },
    "Příkazy pro dotazování a aktualizaci dat": { ex: "SELECT nemění data, pouze vrací výsledek. INSERT vloží nový řádek, UPDATE mění existující řádky vybrané podmínkou a DELETE je odstraní. U UPDATE a DELETE je WHERE zásadní; bez něj se operace provede nad celou tabulkou.", cv: "INSERT INTO Student(id,jmeno,rocnik) VALUES (10,'Eva',1); UPDATE Student SET rocnik = rocnik + 1 WHERE id = 10; SELECT * FROM Student WHERE rocnik = 1; DELETE FROM Student WHERE id = 10;. Každý příkaz pokrývá jednu ze základních operací CRUD." },
    "Agregační funkce": { ex: "GROUP BY rozdělí řádky do skupin podle oboru a COUNT(*) spočítá počet řádků v každé skupině. HAVING filtruje až hotové skupiny, například HAVING COUNT(*) >= 10. WHERE by filtrovalo jednotlivé řádky před seskupením.", cv: "SELECT id_odd, AVG(plat) AS prumerny_plat FROM Zamestnanec GROUP BY id_odd HAVING COUNT(*) >= 5;. GROUP BY vytvoří skupinu pro každé oddělení, AVG spočítá průměrný plat a HAVING odstraní oddělení s méně než pěti zaměstnanci." },
    "Triggery a uložené procedury": { ex: "Trigger je databázová reakce na událost. AFTER INSERT ON Objednavka může pro každý vložený řádek provést UPDATE Sklad SET kusu = kusu - NEW.mnozstvi WHERE id = NEW.id_zbozi. Výhoda je centrální vynucení pravidla, riziko skrytá vedlejší logika.", cv: "Trigger: AFTER DELETE ON Zakaznik FOR EACH ROW INSERT INTO AuditZakaznik(jmeno, smazano_v) VALUES (OLD.jmeno, CURRENT_TIMESTAMP). OLD obsahuje hodnoty mazáného řádku. Auditní tabulka tak zachová informaci, kdo byl smazán a kdy, i když původní řádek zmizel." },
    "Definice dat a integritní omezení": { ex: "DDL definuje strukturu a omezení, která SŘBD kontroluje při každé změně. PRIMARY KEY zajišťuje identitu řádku, FOREIGN KEY existenci odkazovaného řádku, NOT NULL povinnou hodnotu a CHECK doménové pravidlo typu věk>=18.", cv: "CREATE TABLE Zamestnanec (id INT PRIMARY KEY, jmeno VARCHAR(100) NOT NULL, plat DECIMAL(10,2) NOT NULL CHECK (plat >= 0), id_odd INT NOT NULL, FOREIGN KEY (id_odd) REFERENCES Oddeleni(id));. Tabulka vynucuje identitu zaměstnance, povinné hodnoty, nezáporný plat a existující oddělení." },
    "Transakční zpracování a jeho vlastnosti": { ex: "Převod peněz se nesmí provést jen napůl. BEGIN zahájí transakci, první UPDATE odečte částku, druhý ji připíše. Pokud druhý krok selže, ROLLBACK vrátí i první změnu; teprve COMMIT trvale uloží obě změny.", cv: "BEGIN; UPDATE Ucet SET zustatek=zustatek-:castka WHERE id=:z; UPDATE Ucet SET zustatek=zustatek+:castka WHERE id=:c; COMMIT; při chybě ROLLBACK. Atomicitu zajišťuje commit/rollback, konzistenci omezení a kontrola zůstatku, izolaci zámky nebo MVCC, trvanlivost zápis transakčního logu před potvrzením." },
    "Základní principy vyhodnocování dotazů": { ex: "Bez indexu musí databáze porovnat id s každým řádkem, tedy sekvenční průchod. B-stromový index nad id umožní navigaci podle klíče v logaritmickém počtu kroků a potom načtení odpovídajícího řádku. Optimalizátor volí plán podle odhadu selektivity a ceny.", cv: "Index nad příjmení umožní rychle najít rozsah záznamů s hodnotou 'Novák' místo čtení celé tabulky. Cena indexu je dodatečné místo na disku a pomalejší INSERT/UPDATE/DELETE, protože se musí udržovat i indexová struktura. U málo selektivních hodnot nemusí index pomoci." }
  },
  "Operační systémy": {
    "Architektura operačního systému a jádra": { ex: "Monolitické jádro drží správu procesů, paměti, souborů i mnoho ovladačů v privilegovaném prostoru, což snižuje režii volání. Mikrojádro nechává v jádře jen minimum a služby běží jako oddělené procesy, takže pád ovladače nemusí shodit celé jádro, ale komunikace přes zprávy stojí výkon.", cv: "Výkon: monolitické jádro bývá rychlejší díky přímým voláním, mikrojádro má režii komunikace. Spolehlivost: mikrojádro lépe izoluje služby, monolitický ovladač může poškodit celé jádro. Rozšiřování: mikrojádro má čistší oddělení služeb, monolitické systémy často používají moduly, ale stále v jádře." },
    "Základní režimy procesoru": { ex: "Uživatelský režim zakazuje privilegované instrukce a přímý přístup k zařízením. Systémové volání přepne procesor řízeně do režimu jádra, kde OS ověří oprávnění a provede operaci. Tím se chrání paměť, soubory i hardware před libovolnou aplikací.", cv: "Kdyby aplikace běžely privilegovaně, mohly by číst cizí paměť, přepsat jádro, ovládat zařízení nebo obejít práva. Přechod do jádra spouští systémové volání, přerušení od zařízení nebo výjimka procesoru, například page fault či dělení nulou." },
    "Programovací rozhraní a knihovny": { ex: "Knihovna nabízí pohodlné funkce, ale skutečnou službu vykoná jádro přes systémové volání. printf formátuje text v uživatelském prostoru a nakonec použije write pro zápis na deskriptor. API tak odděluje aplikaci od detailů hardwaru a jádra.", cv: "Soubory: open, read, write, close pro práci s deskriptory. Procesy: fork, exec, wait nebo exit pro vytváření a řízení procesů. Paměť: mmap, brk nebo munmap pro mapování a správu adresního prostoru. Každá skupina zpřístupňuje chráněný prostředek přes kontrolované rozhraní." },
    "Uživatel, přístupová práva, virtualizace": { ex: "Práva rw-r--r-- znamenají: vlastník může číst a zapisovat, skupina jen číst, ostatní jen číst. Kontejner izoluje procesy, souborový systém a síťové prostředí pomocí mechanismů stejného jádra, zatímco virtuální stroj virtualizuje celý hardware pro hostovaný OS.", cv: "rwxr-x---: vlastník smí číst, zapisovat a spouštět; skupina smí číst a spouštět, ale ne zapisovat; ostatní nemají žádná práva. U adresáře x znamená možnost projít adresářem, r vypsat jména a w měnit jeho obsah." },
    "Virtuální paměť, proces a stránkové tabulky": { ex: "Virtuální adresa se rozdělí na číslo stránky a offset. Stránková tabulka procesu převede číslo virtuální stránky na fyzický rámec, offset se zachová. Proto mohou dva procesy používat stejnou virtuální adresu, ale mapovat ji na jiné fyzické místo.", cv: "Procesor vezme číslo virtuální stránky, najde záznam ve stránkové tabulce nebo TLB a získá číslo fyzického rámce; offset připojí beze změny. Pokud záznam není přítomen, vznikne page fault. Jádro stránku načte z disku nebo vytvoří, aktualizuje tabulku a instrukci zopakuje; neplatný přístup skončí chybou procesu." },
    "Vlákno, plánování vláken a procesů": { ex: "Proces vlastní adresní prostor a prostředky, vlákna uvnitř procesu sdílejí paměť, ale mají vlastní zásobník a kontext běhu. Plánovač přepíná runnable vlákna na CPU. Round-robin dává každému časové kvantum, čímž zlepšuje odezvu interaktivních úloh.", cv: "Postup: u FCFS se úlohy seřadí podle příchodu; čekání úlohy je součet dob běhu předchozích úloh. U round-robin se simuluje fronta po kvantech, nedokončená úloha jde na konec. Pro každou úlohu spočítej čas dokončení, čekání = dokončení − příchod − vlastní běh, a průměr je součet čekání dělený počtem úloh." },
    "Souběžnost, uváznutí, přidělování zdrojů": { ex: "Deadlock vznikne, když vlákno T1 drží zámek A a čeká na B, zatímco T2 drží B a čeká na A. Jsou splněny podmínky vzájemného vyloučení, drž a čekej, nepreemptivnost a cyklické čekání. Jednotné pořadí zamykání, například vždy A potom B, cyklus odstraní.", cv: "Situace: T1 zamkne L1 a pak žádá L2; T2 zamkne L2 a pak žádá L1. Obě čekají navždy. Oprava: stanovit globální pořadí zámků a vynutit, že každé vlákno zamyká nejprve L1 a teprve potom L2, případně použít try-lock s uvolněním a opakováním." },
    "Vznik procesu v POSIX a copy-on-write": { ex: "fork vytvoří potomka jako kopii procesu. V rodiči vrátí PID potomka, v potomkovi 0, při chybě −1. Copy-on-write znamená, že stránky se fyzicky nekopírují hned; oba procesy je sdílejí jen pro čtení a kopie vznikne až při zápisu.", cv: "Příklad: pid_t pid=fork(); if (pid==0) { /* potomek */ } else if (pid>0) { /* rodič, pid je PID potomka */ } else { /* chyba */ }. Po fork běží oba procesy od stejného místa programu, ale návratová hodnota jim umožní zvolit odlišnou větev." }
  },
  "Souborové systémy": {
    "Blokové zařízení": { ex: "Blokové zařízení neumí alokovat půl bloku jako samostatnou jednotku souborového systému. Soubor 5 KiB při bloku 4 KiB potřebuje ceil(5/4)=2 bloky, tedy 8 KiB prostoru. Nevyužité 3 KiB v posledním bloku jsou vnitřní fragmentace.", cv: "10 KiB při bloku 4 KiB potřebuje ceil(10/4)=3 bloky. Tři bloky mají kapacitu 12 KiB, takže poslední blok obsahuje 2 KiB dat a 2 KiB zůstávají nevyužité. V bajtech je to 2048 B nevyužitého místa." },
    "Bloková vrstva a I/O plánovač": { ex: "U rotačního disku dominuje seek, tedy přesun hlavy. SCAN se chová jako výtah: obsluhuje požadavky ve směru pohybu podle pořadí stop, po dosažení konce nebo posledního požadavku změní směr. Tím snižuje chaotické skákání hlavy proti FCFS.", cv: "Seřaď požadavky podle čísla stopy. Od aktuální pozice nejprve vezmi všechny požadavky ve zvoleném směru v rostoucím nebo klesajícím pořadí, poté otoč směr a obsluž zbytek. Celkový pohyb je součet absolutních rozdílů mezi po sobě navštívenými stopami, včetně případného dojezdu na kraj podle varianty SCAN." },
    "RAID": { ex: "RAID 0 stripuje data a zvyšuje propustnost, ale nemá redundanci. RAID 1 zrcadlí stejná data, takže kapacita je poloviční, ale jeden disk může selhat. RAID 5 rozkládá data i paritu, využitelná kapacita je N−1 disků a snese výpadek jednoho disku.", cv: "RAID 0: kapacita součet disků, vysoká rychlost, žádná odolnost. RAID 1: kapacita jedné kopie, rychlé čtení, zápis jako na jeden disk, přežije selhání jedné kopie. RAID 5: kapacita (N−1) disků, dobré čtení, zápisy dražší kvůli paritě, přežije výpadek jednoho disku." },
    "Šifrování disku": { ex: "Full-disk encryption chrání data v klidu: bez klíče jsou bloky na disku nerozlišitelné od náhodných dat. Po přihlášení se data transparentně dešifrují pro běžící systém, takže nechrání před malwarem aktivním v odemčené relaci.", cv: "Šifrování celého disku chrání celý oddíl včetně dočasných souborů a swapu při ztrátě zařízení, ale po odemčení vidí data celý systém. Šifrování jednotlivých souborů chrání vybrané soubory a může rozlišovat příjemce, ale metadata a nešifrované kopie mohou zůstat jinde." },
    "Obyčejné soubory": { ex: "Souborový systém neví, že bajty tvoří třeba obrázek nebo text; to interpretuje aplikace podle formátu. Metadata jsou informace o souboru, nikoli jeho obsah: velikost, vlastník, práva, časy, odkazy na bloky nebo typ položky.", cv: "Metadata zahrnují velikost, vlastníka, skupinu, práva, časy vytvoření/změny/přístupu, počet odkazů a umístění datových bloků. Obsah je vlastní posloupnost bajtů čtená aplikací. Změna obsahu mění data souboru, změna práv mění metadata." },
    "Alokace volného místa a fragmentace": { ex: "Souvislá alokace drží bloky za sebou, takže sekvenční i náhodný přístup je rychlý, ale hledá se dostatečně velká mezera. Zřetězená alokace snadno přidává bloky, ale náhodný přístup je pomalý. Indexová alokace drží seznam bloků v indexu, typicky i-uzlu, a lépe podporuje náhodný přístup.", cv: "Souvislá: rychlá, jednoduchá, trpí externí fragmentací a špatně roste. Zřetězená: netrpí požadavkem na souvislé místo, ale náhodný přístup vyžaduje průchod řetězem a poškození odkazu je problém. Indexová: bloky mohou být kdekoliv, náhodný přístup je přes index, ale index zabírá místo a u velkých souborů se musí vrstvit." },
    "Adresářová struktura a její reprezentace na disku": { ex: "Adresář mapuje jména na identifikátory souborů, typicky i-uzly. I-uzel nese metadata a adresy datových bloků. Oddělení jména od i-uzlu umožňuje hardlinky: více adresářových položek může odkazovat na stejný soubor.", cv: "Při otevření /home/user/data.txt systém začne v kořenovém adresáři /, najde položku home a její i-uzel, v něm najde adresář user, potom položku data.txt. Z cílového i-uzlu ověří práva, vytvoří otevřený soubor/deskriptor a podle odkazů v i-uzlu načítá datové bloky." },
    "Vstup a výstup mapovaný do paměti": { ex: "mmap namapuje soubor do virtuální paměti procesu. První přístup na stránku vyvolá page fault a jádro načte odpovídající blok; další práce je běžné čtení paměti. Zápisy se podle režimu promítají zpět do souboru nebo jen do soukromé kopie.", cv: "Výhody: méně explicitních kopií a systémových volání, jednoduchý přístup jako k poli, sdílení mapovaných stránek mezi procesy. Hodí se pro velké soubory s náhodným přístupem, databázové indexy nebo sdílenou paměť. Nevýhodou je nutnost správně řešit chyby stránkování a synchronizaci zápisů." }
  },
  "Sítě": {
    "Modely vrstev (ISO/OSI, TCP/IP)": { ex: "Vrstvení rozděluje komunikaci na úrovně s jasným rozhraním. ISO/OSI je pedagogický sedmivrstvý model, TCP/IP praktický model internetu. Nižší vrstvy řeší fyzický přenos a doručení paketů, vyšší vrstvy transport mezi aplikacemi a aplikační protokoly.", cv: "HTTP patří do aplikační vrstvy a přenáší webové požadavky a odpovědi. TCP patří do transportní vrstvy a poskytuje spolehlivý proud bajtů mezi porty. IP je internetová/síťová vrstva a směruje pakety mezi sítěmi. Ethernet je vrstva síťového rozhraní/linková vrstva a přenáší rámce v lokální síti." },
    "Funkcionalita a součinnost vrstev, adresace": { ex: "Zapouzdření znamená, že každá vrstva přidá vlastní hlavičku. Aplikace vytvoří data, TCP přidá porty a sekvenční čísla, IP přidá zdrojovou a cílovou IP adresu, Ethernet přidá MAC adresy v rámci lokálního segmentu. Příjemce hlavičky postupně odstraňuje.", cv: "Aplikační data se předají transportní vrstvě, ta vytvoří segment s porty. Síťová vrstva ho zabalí do IP paketu se zdrojovou a cílovou IP adresou. Linková vrstva vytvoří rámec se zdrojovou a cílovou MAC adresou pro další skok. Fyzická vrstva převede bity rámce na signál." },
    "Fyzická vrstva, signály a jejich kódování": { ex: "Fyzická vrstva řeší reprezentaci bitů v médiu. NRZ drží jednu úroveň pro 1 a druhou pro 0, ale dlouhé sekvence stejných bitů ztěžují synchronizaci. Manchester vkládá přechod uprostřed bitového intervalu, takže nese i hodinovou informaci za cenu vyšší šířky pásma.", cv: "U NRZ lze 1011 zakreslit jako vysoká, nízká, vysoká, vysoká úroveň v po sobě jdoucích intervalech. U Manchesteru má každý bit přechod uprostřed; podle zvolené konvence například 1 jako nízká→vysoká a 0 jako vysoká→nízká. Sekvence 1011 tedy obsahuje středové přechody v každém bitu." },
    "Řízení přístupu k médiu": { ex: "CSMA/CD: stanice poslouchá médium, vysílá, a pokud detekuje kolizi, přeruší vysílání a opakuje po náhodné prodlevě. U Wi-Fi stanice při vysílání špatně detekuje kolizi, protože vlastní signál přehluší příjem a existují skryté stanice; proto používá CSMA/CA, tedy vyhýbání kolizím.", cv: "CSMA/CD kolize detekuje po zahájení vysílání a řeší je zastavením a backoffem; hodí se pro starý sdílený drátový Ethernet. CSMA/CA se snaží kolizi předejít čekáním, náhodným backoffem a případně RTS/CTS. Bezdrátové sítě nepoužívají spolehlivou detekci kolizí kvůli skrytým uzlům a omezení rádiového vysílače/přijímače." },
    "Propojování počítačových sítí": { ex: "Opakovač pracuje na fyzické vrstvě a regeneruje signál bez znalosti rámců. Přepínač pracuje na linkové vrstvě, učí se MAC adresy a posílá rámce na správný port. Směrovač pracuje na síťové vrstvě, rozhoduje podle IP adres a propojuje různé sítě.", cv: "Opakovač: fyzická vrstva, zesílí nebo obnoví bity signálu. Přepínač: linková vrstva, přeposílá Ethernetové rámce podle MAC tabulky v jedné LAN. Směrovač: síťová vrstva, podle směrovací tabulky posílá IP pakety mezi sítěmi a obvykle odděluje broadcast domény." },
    "Síťové protokoly, přepínání a směrování, multicast": { ex: "Směrování vybírá cestu mezi sítěmi podle IP prefixů a směrovacích tabulek. Přepínání posílá rámce uvnitř lokální sítě podle MAC adres. Multicast šetří kapacitu: zdroj pošle jeden tok pro skupinovou adresu a síť ho větví jen tam, kde jsou příjemci.", cv: "Unicast je komunikace jeden odesílatel jednomu příjemci, například HTTP požadavek. Broadcast je doručení všem v lokální síti, například ARP dotaz. Multicast je doručení členům skupiny, například IPTV nebo distribuovaný video stream pro přihlášené příjemce." },
    "Zajištěný přenos, sestavení a ukončení spojení": { ex: "TCP handshake synchronizuje počáteční sekvenční čísla: klient pošle SYN, server SYN-ACK, klient ACK. Spolehlivost potom stojí na číslování bajtů, potvrzeních a retransmisích. Pokud potvrzení nepřijde včas nebo ACK přeskočí očekávaný rozsah, odesílatel ztracená data pošle znovu.", cv: "Sled zpráv: klient → server SYN(seq=x), server → klient SYN-ACK(seq=y, ack=x+1), klient → server ACK(ack=y+1). Příjemce pozná ztrátu podle mezery v sekvenčních číslech nebo opakovaně potvrzuje poslední souvisle přijatý bajt. Odesílatel reaguje timeoutem nebo fast retransmit po duplicitních ACK." },
    "Transportní protokoly": { ex: "TCP volíme tam, kde je nutná úplnost a pořadí dat; cena je handshake, potvrzování a řízení zahlcení. UDP volíme tam, kde je důležitá nízká latence nebo jednoduchý dotaz/odpověď a aplikace si případnou spolehlivost řeší sama.", cv: "E-mail: TCP, protože SMTP/IMAP potřebují spolehlivý přenos. Videohovor: typicky UDP, protože zpožděný paket už nemá hodnotu. DNS dotaz: běžně UDP kvůli krátké výměně, TCP pro velké odpovědi nebo zónové přenosy. Přenos souboru: TCP, protože soubor musí dorazit celý a ve správném pořadí." }
  },
  "Síťové aplikace a bezpečnost": {

function exampleSolution(title, subtopic) {
  const d = SOLUTIONS[title] && SOLUTIONS[title][subtopic];
  if (d && d.ex) return d.ex;
  return "Postup: vyjdi z přesné definice pojmu, proveď uvedený výpočet či konstrukci krok za krokem a výsledek interpretuj v kontextu zadání.";
}

function exerciseSolution(title, subtopic) {
  const d = SOLUTIONS[title] && SOLUTIONS[title][subtopic];
  if (d && d.cv) return d.cv;
  return "Postup: rozeber zadání na dílčí kroky, každý proveď s odůvodněním a na závěr ověř, že výsledek odpovídá očekávání.";
}

function makeExtra(label, prompt, solution) {
  const wrap = el("div", "sub-extra");
  const p = el("p", "sub-prompt");
  p.innerHTML = "<strong>" + label + ":</strong> " + prompt;
  wrap.appendChild(p);
  const btn = el("button", "sol-btn", "Zobrazit řešení");
  btn.setAttribute("aria-expanded", "false");
  const sol = el("div", "sol");
  sol.innerHTML = "<strong>Řešení:</strong> " + solution;
  btn.addEventListener("click", () => {
    const open = sol.classList.toggle("open");
    btn.setAttribute("aria-expanded", String(open));
    btn.textContent = open ? "Skrýt řešení" : "Zobrazit řešení";
  });
  wrap.appendChild(btn);
  wrap.appendChild(sol);
  return wrap;
}

function getCookie(name) {
  const parts = document.cookie.split(";").map(v => v.trim());
  const prefix = name + "=";
  const found = parts.find(p => p.startsWith(prefix));
  return found ? decodeURIComponent(found.slice(prefix.length)) : "";
}

function setCookie(name, value, days) {
  const expires = new Date(Date.now() + days * 86400000).toUTCString();
  document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + expires + "; path=/; SameSite=Lax";
}

function loadCompletedTitles() {
  try {
    const raw = getCookie(COMPLETED_COOKIE);
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    return new Set(Array.isArray(arr) ? arr : []);
  } catch {
    return new Set();
  }
}

function saveCompletedTitles() {
  setCookie(COMPLETED_COOKIE, JSON.stringify([...completedTitles]), COOKIE_DAYS);
}

function resetCompletion(silent = false) {
  completedTitles.clear();
  saveCompletedTitles();
  if (!silent) alert("Dokončení titulů bylo resetováno.");
}

function markTitleCompleted(title) {
  completedTitles.add(title);
  if (completedTitles.size >= TOPICS.length) {
    alert("Skvělé! Máš dokončené všechny tituly. Dokončení se nyní resetuje.");
    resetCompletion(true);
    return;
  }
  saveCompletedTitles();
}

const pickBtn = document.getElementById("pick");
pickBtn.addEventListener("click", pick);
document.getElementById("resetProgress").addEventListener("click", () => resetCompletion());
document.addEventListener("keydown", e => {
  if (e.target.tagName === "SUMMARY") return;
  if (e.code === "Space" || e.code === "Enter") {
    e.preventDefault();
    pick();
  }
});
